<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Математическая игра — 2 класс</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Arial', sans-serif;
    background: linear-gradient(135deg, #ffe0f0, #e0f7ff);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  h1 {
    text-align: center;
    color: #ff6b9d;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 20px;
  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 12px 22px;
    background: #fff;
    border: 3px solid #ff6b9d;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color: #ff6b9d;
    transition: 0.2s;
  }
  .tab.active, .tab:hover {
    background: #ff6b9d;
    color: #fff;
  }
  .screen {
    display: none;
    background: #fff;
    border-radius: 25px;
    padding: 30px;
    max-width: 700px;
    margin: 0 auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  .screen.active { display: block; }
  .screen h2 {
    color: #4a90e2;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Механика 1 */
  .pairs-container {
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    gap: 30px;
    flex-wrap: wrap;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    min-width: 120px;
  }
  .pair-item {
    padding: 15px;
    background: #ffeaa7;
    border: 3px solid #fdcb6e;
    border-radius: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
  }
  .pair-item.answer {
    background: #a8e6cf;
    border-color: #55c89b;
  }
  .pair-item.selected {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff6b9d;
    border-color: #ff6b9d;
  }
  .pair-item.matched {
    opacity: 0.4;
    pointer-events: none;
    background: #dfe6e9;
    border-color: #b2bec3;
  }
  .pair-item.wrong {
    animation: shake 0.4s;
    background: #fab1a0;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Механика 2 */
  .task {
    background: #fff9e6;
    border: 2px dashed #f39c12;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 15px;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
  }
  .task input {
    width: 60px;
    padding: 6px;
    font-size: 20px;
    text-align: center;
    border: 2px solid #4a90e2;
    border-radius: 8px;
    margin: 0 4px;
    font-family: inherit;
  }
  .task input.correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .task input.wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }

  /* Механика 3 */
  .problem-text {
    background: #e8f4fd;
    border-left: 5px solid #4a90e2;
    padding: 18px;
    border-radius: 10px;
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .step {
    background: #fff9e6;
    border: 2px dashed #f39c12;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
    font-size: 17px;
  }
  .step-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .step-row label {
    font-weight: bold;
  }
  .step select, .step input[type="number"] {
    padding: 8px;
    font-size: 17px;
    border: 2px solid #4a90e2;
    border-radius: 8px;
    font-family: inherit;
  }
  .step input[type="number"] {
    width: 80px;
    text-align: center;
  }
  .step select.correct, .step input.correct {
    background: #d4edda;
    border-color: #28a745;
  }
  .step select.wrong, .step input.wrong {
    background: #f8d7da;
    border-color: #dc3545;
  }

  .btn {
    display: block;
    margin: 20px auto 0;
    padding: 12px 30px;
    background: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn:hover { background: #357abd; transform: scale(1.05); }

  .message {
    text-align: center;
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
    min-height: 30px;
  }
  .message.good { color: #28a745; }
  .message.bad { color: #dc3545; }
</style>
</head>
<body>

<h1>🌟 Математика — 2 класс 🌟</h1>

<div class="tabs">
  <div class="tab active" data-screen="screen1">1. Соедини пары</div>
  <div class="tab" data-screen="screen2">2. Пропущенные числа</div>
  <div class="tab" data-screen="screen3">3. Реши задачу</div>
</div>

<!-- МЕХАНИКА 1 -->
<div class="screen active" id="screen1">
  <h2>Соедини пример и ответ</h2>
  <p style="text-align:center; margin-bottom:15px;">Кликни на пример, потом на правильный ответ</p>
  <div class="pairs-container">
    <div class="column" id="leftCol"></div>
    <div class="column" id="rightCol"></div>
  </div>
  <div class="message" id="msg1"></div>
  <button class="btn" onclick="initGame1()">Новая игра</button>
</div>

<!-- МЕХАНИКА 2 -->
<div class="screen" id="screen2">
  <h2>Вставь пропущенные числа</h2>
  <div id="tasks2"></div>
  <button class="btn" onclick="checkGame2()">Проверить</button>
  <div class="message" id="msg2"></div>
  <button class="btn" onclick="initGame2()" style="background:#55c89b;">Новые задания</button>
</div>

<!-- МЕХАНИКА 3 -->
<div class="screen" id="screen3">
  <h2>Реши задачу в два действия</h2>
  <div class="problem-text" id="problemText"></div>
  <div id="stepsContainer"></div>
  <button class="btn" onclick="checkGame3()">Проверить</button>
  <div class="message" id="msg3"></div>
  <button class="btn" onclick="initGame3()" style="background:#f39c12;">Новая задача</button>
</div>

<script>
/* ===== Переключение вкладок ===== */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.screen).classList.add('active');
  });
});

/* ===== МЕХАНИКА 1: Соедини пары ===== */
let selectedLeft = null;
let matchedCount = 0;
const pairsPool = [
  {q:"2 × 3", a:6}, {q:"4 × 2", a:8}, {q:"5 × 2", a:10},
  {q:"3 × 3", a:9}, {q:"2 × 6", a:12}, {q:"6 ÷ 2", a:3},
  {q:"8 ÷ 4", a:2}, {q:"10 ÷ 5", a:2}, {q:"12 ÷ 3", a:4},
  {q:"15 ÷ 5", a:3}, {q:"2 × 5", a:10}, {q:"3 × 4", a:12},
  {q:"9 ÷ 3", a:3}, {q:"14 ÷ 2", a:7}, {q:"2 × 7", a:14}
];

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function initGame1(){
  const chosen = shuffle([...pairsPool]).slice(0,5);
  const leftCol = document.getElementById('leftCol');
  const rightCol = document.getElementById('rightCol');
  leftCol.innerHTML = ''; rightCol.innerHTML = '';
  document.getElementById('msg1').textContent = '';
  matchedCount = 0; selectedLeft = null;

  const leftItems = shuffle([...chosen]);
  const rightItems = shuffle([...chosen]);

  leftItems.forEach(p => {
    const div = document.createElement('div');
    div.className = 'pair-item';
    div.textContent = p.q;
    div.dataset.answer = p.a;
    div.addEventListener('click', () => selectLeft(div));
    leftCol.appendChild(div);
  });
  rightItems.forEach(p => {
    const div = document.createElement('div');
    div.className = 'pair-item answer';
    div.textContent = p.a;
    div.dataset.value = p.a;
    div.addEventListener('click', () => selectRight(div));
    rightCol.appendChild(div);
  });
}

function selectLeft(el){
  if(el.classList.contains('matched')) return;
  document.querySelectorAll('#leftCol .pair-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedLeft = el;
}

function selectRight(el){
  if(!selectedLeft || el.classList.contains('matched')) return;
  if(selectedLeft.dataset.answer == el.dataset.value){
    selectedLeft.classList.add('matched');
    el.classList.add('matched');
    selectedLeft.classList.remove('selected');
    selectedLeft = null;
    matchedCount++;
    if(matchedCount === 5){
      document.getElementById('msg1').textContent = '🎉 Молодец! Все пары найдены!';
      document.getElementById('msg1').className = 'message good';
    }
  } else {
    el.classList.add('wrong');
    selectedLeft.classList.add('wrong');
    const s = selectedLeft;
    setTimeout(()=>{
      el.classList.remove('wrong');
      s.classList.remove('wrong','selected');
    }, 500);
    selectedLeft = null;
  }
}

/* ===== МЕХАНИКА 2: Пропущенные числа ===== */
function generateTask2(){
  const types = [
    () => {
      const a = rand(2,5), b = rand(2,5), r = a*b;
      const hide = Math.random()<0.5 ? 'a' : 'b';
      if(hide==='a') return {html:`<input type="number"> × ${b} = ${r}`, answer:a};
      else return {html:`${a} × <input type="number"> = ${r}`, answer:b};
    },
    () => {
      const b = rand(2,5), r = rand(2,5), a = b*r;
      return {html:`${a} ÷ ${b} = <input type="number">`, answer:r};
    },
    () => {
      const a = rand(2,5), b = rand(2,5), r = a*b;
      return {html:`${a} × ${b} = <input type="number">`, answer:r};
    }
  ];
  return types[Math.floor(Math.random()*types.length)]();
}

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function initGame2(){
  const container = document.getElementById('tasks2');
  container.innerHTML = '';
  document.getElementById('msg2').textContent = '';
  for(let i=0;i<5;i++){
    const t = generateTask2();
    const div = document.createElement('div');
    div.className = 'task';
    div.innerHTML = t.html;
    div.dataset.answer = t.answer;
    container.appendChild(div);
  }
}

function checkGame2(){
  const tasks = document.querySelectorAll('#tasks2 .task');
  let correct = 0;
  tasks.forEach(task => {
    const inp = task.querySelector('input');
    const val = parseInt(inp.value);
    if(val == task.dataset.answer){
      inp.classList.add('correct');
      inp.classList.remove('wrong');
      correct++;
    } else {
      inp.classList.add('wrong');
      inp.classList.remove('correct');
    }
  });
  const msg = document.getElementById('msg2');
  if(correct === 5){
    msg.textContent = `🎉 Отлично! Все ${correct} из 5 верно!`;
    msg.className = 'message good';
  } else {
    msg.textContent = `Правильно: ${correct} из 5. Попробуй ещё!`;
    msg.className = 'message bad';
  }
}

/* ===== МЕХАНИКА 3: Задача в два действия ===== */
const problems = [
  {
    text: 'В магазине в первый день продали 18 килограммов яблок, а во второй — 12 килограммов. Все яблоки разложили в одинаковые корзины, по 6 килограммов в каждую. Сколько корзин понадобилось?',
    steps: [
      {
        questions: ['Сколько всего килограммов яблок продали за два дня', 'Сколько корзин понадобилось', 'Сколько килограммов яблок продали во второй день'],
        correctQuestion: 'Сколько всего килограммов яблок продали за два дня',
        answer: 30
      },
      {
        questions: ['Сколько всего килограммов яблок продали за два дня', 'Сколько корзин понадобилось', 'Сколько килограммов в одной корзине'],
        correctQuestion: 'Сколько корзин понадобилось',
        answer: 5
      }
    ]
  },
  {
    text: 'У Маши было 20 конфет. Она раздала 4 конфеты подруге, а остальные разложила в 4 одинаковых пакетика. Сколько конфет получилось в каждом пакетике?',
    steps: [
      {
        questions: ['Сколько конфет раздала Маша', 'Сколько конфет осталось у Маши', 'Сколько конфет в каждом пакетике'],
        correctQuestion: 'Сколько конфет осталось у Маши',
        answer: 16
      },
      {
        questions: ['Сколько конфет раздала Маша', 'Сколько конфет осталось у Маши', 'Сколько конфет в каждом пакетике'],
        correctQuestion: 'Сколько конфет в каждом пакетике',
        answer: 4
      }
    ]
  },
  {
    text: 'В саду росло 3 ряда яблонь, по 5 яблонь в каждом ряду, и ещё 4 груши. Сколько всего деревьев росло в саду?',
    steps: [
      {
        questions: ['Сколько было яблонь', 'Сколько было груш', 'Сколько всего деревьев'],
        correctQuestion: 'Сколько было яблонь',
        answer: 15
      },
      {
        questions: ['Сколько было яблонь', 'Сколько было груш', 'Сколько всего деревьев'],
        correctQuestion: 'Сколько всего деревьев',
        answer: 19
      }
    ]
  },
  {
    text: 'Мама купила 2 пакета молока по 6 рублей и 1 батон за 8 рублей. Сколько рублей она заплатила за всю покупку?',
    steps: [
      {
        questions: ['Сколько рублей стоил один пакет молока', 'Сколько рублей стоили 2 пакета молока', 'Сколько рублей стоил батон'],
        correctQuestion: 'Сколько рублей стоили 2 пакета молока',
        answer: 12
      },
      {
        questions: ['Сколько рублей стоили 2 пакета молока', 'Сколько рублей стоил батон', 'Сколько рублей мама заплатила за всю покупку'],
        correctQuestion: 'Сколько рублей мама заплатила за всю покупку',
        answer: 20
      }
    ]
  },
  {
    text: 'В классе 16 мальчиков и 14 девочек. Их разделили на 5 одинаковых команд для игры. Сколько детей в каждой команде?',
    steps: [
      {
        questions: ['Сколько в классе мальчиков', 'Сколько всего детей в классе', 'Сколько детей в каждой команде'],
        correctQuestion: 'Сколько всего детей в классе',
        answer: 30
      },
      {
        questions: ['Сколько в классе мальчиков', 'Сколько всего детей в классе', 'Сколько детей в каждой команде'],
        correctQuestion: 'Сколько детей в каждой команде',
        answer: 6
      }
    ]
  },
  {
    text: 'У Пети было 24 марки. Он подарил 6 марок брату, а остальные наклеил в альбом по 3 марки на страницу. Сколько страниц заняли марки?',
    steps: [
      {
        questions: ['Сколько марок подарил Петя', 'Сколько марок осталось у Пети', 'Сколько страниц заняли марки'],
        correctQuestion: 'Сколько марок осталось у Пети',
        answer: 18
      },
      {
        questions: ['Сколько марок подарил Петя', 'Сколько марок осталось у Пети', 'Сколько страниц заняли марки'],
        correctQuestion: 'Сколько страниц заняли марки',
        answer: 6
      }
    ]
  },
  {
    text: 'В библиотеке 3 полки с книгами, на каждой полке по 8 книг, и ещё 5 журналов. Сколько всего книг и журналов в библиотеке?',
    steps: [
      {
        questions: ['Сколько книг на полках', 'Сколько журналов', 'Сколько всего книг и журналов'],
        correctQuestion: 'Сколько книг на полках',
        answer: 24
      },
      {
        questions: ['Сколько книг на полках', 'Сколько журналов', 'Сколько всего книг и журналов'],
        correctQuestion: 'Сколько всего книг и журналов',
        answer: 29
      }
    ]
  },
  {
    text: 'Для школьного праздника купили 4 коробки печенья по 6 штук в каждой и 10 пирожных. Сколько всего сладостей купили?',
    steps: [
      {
        questions: ['Сколько купили коробок печенья', 'Сколько штук печенья купили всего', 'Сколько купили пирожных'],
        correctQuestion: 'Сколько штук печенья купили всего',
        answer: 24
      },
      {
        questions: ['Сколько штук печенья купили всего', 'Сколько купили пирожных', 'Сколько всего сладостей купили'],
        correctQuestion: 'Сколько всего сладостей купили',
        answer: 34
      }
    ]
  }
];

let currentProblem = null;

function initGame3(){
  currentProblem = problems[Math.floor(Math.random()*problems.length)];
  document.getElementById('problemText').textContent = currentProblem.text;
  const container = document.getElementById('stepsContainer');
  container.innerHTML = '';
  document.getElementById('msg3').textContent = '';

  currentProblem.steps.forEach((step, i) => {
    const div = document.createElement('div');
    div.className = 'step';

    const title = document.createElement('div');
    title.innerHTML = `<b>Действие ${i+1}.</b>`;
    div.appendChild(title);

    // Строка 1: что нашли (выпадающий список)
    const row1 = document.createElement('div');
    row1.className = 'step-row';
    row1.innerHTML = '<label>Нашли:</label>';
    const sel = document.createElement('select');
    sel.className = 'question-select';
    sel.innerHTML = '<option value="">— выбери —</option>';
    shuffle([...step.questions]).forEach(q => {
      sel.innerHTML += `<option value="${q}">${q}?</option>`;
    });
    row1.appendChild(sel);
    div.appendChild(row1);

    // Строка 2: число
    const row2 = document.createElement('div');
    row2.className = 'step-row';
    row2.innerHTML = '<label>Ответ:</label>';
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'answer-input';
    row2.appendChild(inp);
    div.appendChild(row2);

    container.appendChild(div);
  });
}

function checkGame3(){
  const steps = document.querySelectorAll('#stepsContainer .step');
  let allCorrect = true;

  steps.forEach((stepDiv, i) => {
    const step = currentProblem.steps[i];
    const sel = stepDiv.querySelector('.question-select');
    const inp = stepDiv.querySelector('.answer-input');

    const userQuestion = sel.value;
    const userAnswer = parseInt(inp.value);

    const questionOk = userQuestion === step.correctQuestion;
    const answerOk = userAnswer === step.answer;

    sel.classList.remove('correct','wrong');
    inp.classList.remove('correct','wrong');

    if(questionOk) sel.classList.add('correct'); else { sel.classList.add('wrong'); allCorrect = false; }
    if(answerOk) inp.classList.add('correct'); else { inp.classList.add('wrong'); allCorrect = false; }
  });

  const msg = document.getElementById('msg3');
  if(allCorrect){
    msg.textContent = '🎉 Правильно! Задача решена!';
    msg.className = 'message good';
  } else {
    msg.textContent = 'Есть ошибки. Подумай ещё раз!';
    msg.className = 'message bad';
  }
}

/* ===== Запуск ===== */
initGame1();
initGame2();
initGame3();
</script>
</body>
</html>
