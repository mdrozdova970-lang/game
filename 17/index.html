<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пиратский сундук — табличное умножение</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --game-bg: #d4b896;
    --game-bg-dark: #8b6239;
    --game-card: #f5e6c8;
    --game-card-dark: #e0c89a;
    --game-primary: #6b4423;
    --game-primary-dark: #3d2410;
    --game-accent: #d4a017;
    --game-accent-light: #f4c542;
    --game-text: #3d2410;
    --game-success: #4a7c2e;
    --game-success-light: #7ab648;
    --game-error: #a83232;
    --game-error-light: #d94545;
    --game-muted: #a67c52;
    --game-green: #5a8f3d;
    --game-beige: #f5e6c8;
    --game-brown: #6b4423;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Open Sans', sans-serif;
    min-height: 100vh;
    color: var(--game-text);
  }

  body {
    /* Пиратский фон с картой сокровищ */
    background: 
      /* Текстура пергамента */
      radial-gradient(ellipse at 20% 30%, rgba(139, 98, 57, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(107, 68, 35, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(212, 184, 150, 0.3) 0%, transparent 70%),
      /* Основной градиент */
      linear-gradient(135deg, #e8cfa3 0%, #d4b896 30%, #b8935f 70%, #8b6239 100%);
    background-attachment: fixed;
    background-size: cover;
    position: relative;
    overflow-x: hidden;
    padding: 16px;
  }

  /* SVG паттерн карты сокровищ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%236b4423' stroke-width='0.5' opacity='0.15'%3E%3Ccircle cx='40' cy='40' r='20'/%3E%3Ccircle cx='160' cy='120' r='30'/%3E%3Cpath d='M 20 160 Q 60 140 100 160 T 180 160'/%3E%3Cpath d='M 140 20 L 160 40 L 140 60 L 120 40 Z'/%3E%3Cpath d='M 60 100 L 80 120 L 60 140 L 40 120 Z'/%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* Дополнительный слой с компасом и декором */
  body::after {
    content: '';
    position: fixed;
    top: 10%;
    right: 5%;
    width: 150px;
    height: 150px;
    background: 
      radial-gradient(circle at 30% 30%, rgba(212, 160, 23, 0.3) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='%236b4423' stroke-width='2' opacity='0.3'/%3E%3Ccircle cx='50' cy='50' r='35' fill='none' stroke='%23d4a017' stroke-width='1' opacity='0.4'/%3E%3Cpath d='M 50 10 L 55 45 L 90 50 L 55 55 L 50 90 L 45 55 L 10 50 L 45 45 Z' fill='%236b4423' opacity='0.2'/%3E%3C/svg%3E");
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
    transform: rotate(15deg);
  }

  .screen {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
  }

  .hidden { display: none !important; }

  /* Декоративные углы карты */
  .corner-decor {
    position: fixed;
    width: 100px;
    height: 100px;
    opacity: 0.6;
    z-index: 0;
    pointer-events: none;
  }
  .corner-tl { top: 10px; left: 10px; }
  .corner-tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .corner-bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .corner-br { bottom: 10px; right: 10px; transform: scale(-1, -1); }

  /* ===== СТАРТОВЫЙ ЭКРАН ===== */
  #start-screen {
    text-align: center;
    padding: 30px 20px;
    min-height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .title-card {
    background: linear-gradient(180deg, var(--game-card) 0%, var(--game-card-dark) 100%);
    border: 4px solid var(--game-primary);
    border-radius: 24px;
    padding: 30px 24px;
    box-shadow:
      0 8px 0 var(--game-primary-dark),
      0 16px 30px rgba(61, 36, 16, 0.4),
      inset 0 2px 0 rgba(255, 255, 255, 0.4);
    max-width: 520px;
    width: 100%;
    position: relative;
  }

  .title-card::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 2px dashed var(--game-muted);
    border-radius: 16px;
    pointer-events: none;
  }

  .game-title {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 800;
    color: var(--game-primary-dark);
    text-shadow: 2px 2px 0 var(--game-accent-light);
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .game-subtitle {
    font-size: clamp(16px, 3.5vw, 20px);
    color: var(--game-primary);
    font-weight: 600;
    margin-bottom: 20px;
  }

  .chest-svg {
    width: 180px;
    height: 140px;
    margin: 10px auto 20px;
    filter: drop-shadow(0 6px 8px rgba(61, 36, 16, 0.4));
  }

  .start-description {
    background: rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    font-size: clamp(14px, 3vw, 16px);
    line-height: 1.5;
    color: var(--game-text);
    border: 2px solid var(--game-primary);
  }

  /* ===== КНОПКИ ===== */
  .btn {
    font-family: 'Open Sans', sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 3.5vw, 20px);
    padding: 16px 32px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    min-height: 56px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(180deg, var(--game-green) 0%, #3d6b24 100%);
    color: #fff;
    border: 3px solid #2d4f1a;
    box-shadow:
      0 6px 0 #2d4f1a,
      0 10px 20px rgba(45, 79, 26, 0.4),
      inset 0 2px 0 rgba(255, 255, 255, 0.3);
    text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
  }

  .btn-primary:hover {
    background: linear-gradient(180deg, #6aa347 0%, var(--game-green) 100%);
  }

  .btn-primary:active {
    transform: translateY(4px);
    box-shadow:
      0 2px 0 #2d4f1a,
      0 4px 8px rgba(45, 79, 26, 0.4),
      inset 0 2px 0 rgba(255, 255, 255, 0.3);
  }

  .btn-check {
    background: linear-gradient(180deg, var(--game-accent-light) 0%, var(--game-accent) 100%);
    color: var(--game-primary-dark);
    border: 3px solid #8b6914;
    box-shadow:
      0 5px 0 #8b6914,
      0 8px 15px rgba(139, 105, 20, 0.4),
      inset 0 2px 0 rgba(255, 255, 255, 0.4);
    font-size: clamp(14px, 3vw, 16px);
    padding: 12px 24px;
    min-height: 48px;
  }

  .btn-check:active {
    transform: translateY(3px);
    box-shadow:
      0 2px 0 #8b6914,
      0 4px 8px rgba(139, 105, 20, 0.4);
  }

  .btn-check:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ===== ИГРОВОЙ ЭКРАН ===== */
  #game-screen {
    padding: 10px 0;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--game-card) 0%, var(--game-card-dark) 100%);
    border: 3px solid var(--game-primary);
    border-radius: 16px;
    padding: 12px 18px;
    margin-bottom: 16px;
    box-shadow:
      0 4px 0 var(--game-primary-dark),
      0 8px 15px rgba(61, 36, 16, 0.3),
      inset 0 2px 0 rgba(255, 255, 255, 0.4);
  }

  .score-display {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: clamp(16px, 3.5vw, 20px);
    color: var(--game-primary-dark);
  }

  .score-icon {
    font-size: 24px;
  }

  .score-value {
    background: var(--game-accent-light);
    color: var(--game-primary-dark);
    padding: 4px 12px;
    border-radius: 10px;
    border: 2px solid var(--game-accent);
    min-width: 40px;
    text-align: center;
  }

  .steps-counter {
    font-weight: 600;
    font-size: clamp(14px, 3vw, 16px);
    color: var(--game-primary);
  }

  /* Условие задачи */
  .task-card {
    background: linear-gradient(180deg, #fff8e7 0%, var(--game-card) 100%);
    border: 3px solid var(--game-primary);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow:
      0 6px 0 var(--game-primary-dark),
      0 10px 20px rgba(61, 36, 16, 0.3),
      inset 0 2px 0 rgba(255, 255, 255, 0.5);
    position: relative;
  }

  .task-card::before {
    content: '📜';
    position: absolute;
    top: -18px;
    left: 20px;
    font-size: 32px;
    background: var(--game-card);
    padding: 0 8px;
    border-radius: 50%;
    border: 2px solid var(--game-primary);
  }

  .task-title {
    font-size: clamp(16px, 3.5vw, 18px);
    font-weight: 700;
    color: var(--game-primary-dark);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .task-text {
    font-size: clamp(15px, 3.3vw, 17px);
    line-height: 1.5;
    color: var(--game-text);
  }

  /* Персонаж-кот */
  .cat-container {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: linear-gradient(180deg, var(--game-card) 0%, var(--game-card-dark) 100%);
    border: 3px solid var(--game-primary);
    border-radius: 20px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow:
      0 5px 0 var(--game-primary-dark),
      0 8px 15px rgba(61, 36, 16, 0.3),
      inset 0 2px 0 rgba(255, 255, 255, 0.4);
    min-height: 100px;
  }

  .cat-svg {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    filter: drop-shadow(0 3px 4px rgba(61, 36, 16, 0.3));
  }

  .cat-bubble {
    background: #fff8e7;
    border: 2px solid var(--game-primary);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: clamp(14px, 3vw, 16px);
    line-height: 1.4;
    color: var(--game-text);
    font-weight: 600;
    position: relative;
    flex: 1;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }

  .cat-bubble::before {
    content: '';
    position: absolute;
    left: -10px;
    top: 18px;
    width: 0;
    height: 0;
    border: 8px solid transparent;
    border-right-color: var(--game-primary);
  }

  .cat-bubble::after {
    content: '';
    position: absolute;
    left: -7px;
    top: 20px;
    width: 0;
    height: 0;
    border: 6px solid transparent;
    border-right-color: #fff8e7;
  }

  /* Шаги */
  .steps-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .step {
    background: linear-gradient(180deg, var(--game-card) 0%, var(--game-card-dark) 100%);
    border: 3px solid var(--game-muted);
    border-radius: 18px;
    padding: 16px;
    box-shadow:
      0 4px 0 var(--game-primary-dark),
      0 6px 12px rgba(61, 36, 16, 0.25),
      inset 0 2px 0 rgba(255, 255, 255, 0.4);
    transition: all 0.3s;
    opacity: 0.5;
    pointer-events: none;
  }

  .step.active {
    opacity: 1;
    pointer-events: auto;
    border-color: var(--game-primary);
    transform: scale(1.02);
  }

  .step.completed {
    opacity: 1;
    pointer-events: auto;
    border-color: var(--game-success);
    background: linear-gradient(180deg, #e8f5d8 0%, #d4e8b8 100%);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .step-number {
    background: var(--game-primary);
    color: var(--game-accent-light);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    border: 2px solid var(--game-primary-dark);
    box-shadow: 0 3px 0 var(--game-primary-dark);
    flex-shrink: 0;
  }

  .step.completed .step-number {
    background: var(--game-success);
    color: #fff;
    border-color: #2d4f1a;
    box-shadow: 0 3px 0 #2d4f1a;
  }

  .step-question {
    font-size: clamp(14px, 3vw, 16px);
    font-weight: 600;
    color: var(--game-text);
    line-height: 1.4;
  }

  .step-input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .step-input {
    flex: 1;
    min-width: 120px;
    font-family: 'Open Sans', sans-serif;
    font-size: clamp(16px, 3.5vw, 18px);
    font-weight: 700;
    padding: 12px 14px;
    border: 3px solid var(--game-primary);
    border-radius: 12px;
    background: #fff8e7;
    color: var(--game-text);
    box-shadow:
      inset 0 2px 4px rgba(61, 36, 16, 0.15),
      0 3px 0 var(--game-primary-dark);
    outline: none;
    min-height: 48px;
    transition: border-color 0.2s;
  }

  .step-input:focus {
    border-color: var(--game-accent);
    box-shadow:
      inset 0 2px 4px rgba(61, 36, 16, 0.15),
      0 3px 0 var(--game-primary-dark),
      0 0 0 3px rgba(212, 160, 23, 0.3);
  }

  .step-input.correct {
    border-color: var(--game-success);
    background: #e8f5d8;
    box-shadow:
      inset 0 2px 4px rgba(74, 124, 46, 0.2),
      0 3px 0 #2d4f1a;
  }

  .step-input.incorrect {
    border-color: var(--game-error);
    background: #fde0e0;
    box-shadow:
      inset 0 2px 4px rgba(168, 50, 50, 0.2),
      0 3px 0 #6b1f1f;
  }

  .step-unit {
    font-weight: 700;
    color: var(--game-primary);
    font-size: clamp(14px, 3vw, 16px);
  }

  .step-hint {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(212, 160, 23, 0.2);
    border-left: 4px solid var(--game-accent);
    border-radius: 8px;
    font-size: clamp(13px, 2.8vw, 15px);
    color: var(--game-primary-dark);
    font-weight: 600;
    display: none;
  }

  .step-hint.show { display: block; }

  .step-answer-reveal {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(74, 124, 46, 0.15);
    border-left: 4px solid var(--game-success);
    border-radius: 8px;
    font-size: clamp(13px, 2.8vw, 15px);
    color: var(--game-success);
    font-weight: 700;
    display: none;
  }

  .step-answer-reveal.show { display: block; }

  .step-status {
    margin-top: 8px;
    font-weight: 700;
    font-size: clamp(14px, 3vw, 16px);
    display: none;
  }

  .step-status.show { display: flex; align-items: center; gap: 6px; }
  .step-status.correct { color: var(--game-success); }
  .step-status.incorrect { color: var(--game-error); }

  /* Анимации */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .shake { animation: shake 0.5s ease-in-out; }

  @keyframes successPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .success-pulse { animation: successPulse 0.6s ease-in-out; }

  @keyframes clapHands {
    0%, 100% { transform: rotate(0deg) scale(1); opacity: 1; }
    50% { transform: rotate(-15deg) scale(1.2); opacity: 1; }
  }

  .feedback-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    z-index: 100;
    pointer-events: none;
    display: none;
  }

  .feedback-overlay.show {
    display: block;
    animation: feedbackAnim 0.9s ease-out forwards;
  }

  @keyframes feedbackAnim {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -60%) scale(0.9); opacity: 0; }
  }

  /* ===== ФИНАЛЬНЫЙ ЭКРАН ===== */
  #end-screen {
    text-align: center;
    padding: 30px 20px;
    min-height: calc(100vh - 32px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .end-card {
    background: linear-gradient(180deg, var(--game-card) 0%, var(--game-card-dark) 100%);
    border: 4px solid var(--game-primary);
    border-radius: 24px;
    padding: 30px 24px;
    box-shadow:
      0 8px 0 var(--game-primary-dark),
      0 16px 30px rgba(61, 36, 16, 0.4),
      inset 0 2px 0 rgba(255, 255, 255, 0.4);
    max-width: 520px;
    width: 100%;
    position: relative;
  }

  .end-title {
    font-size: clamp(26px, 5.5vw, 36px);
    font-weight: 800;
    color: var(--game-primary-dark);
    text-shadow: 2px 2px 0 var(--game-accent-light);
    margin-bottom: 16px;
  }

  .stars-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px 0;
  }

  .star {
    font-size: 50px;
    filter: drop-shadow(0 3px 4px rgba(61, 36, 16, 0.4));
    transition: transform 0.3s;
  }

  .star.active {
    animation: starPop 0.6s ease-out backwards;
  }

  .star:nth-child(1).active { animation-delay: 0.2s; }
  .star:nth-child(2).active { animation-delay: 0.5s; }
  .star:nth-child(3).active { animation-delay: 0.8s; }

  @keyframes starPop {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .star.inactive {
    filter: grayscale(100%) opacity(0.4);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 20px 0;
  }

  .stat-box {
    background: rgba(255, 255, 255, 0.5);
    border: 2px solid var(--game-primary);
    border-radius: 14px;
    padding: 12px 8px;
    box-shadow: 0 3px 0 var(--game-primary-dark);
  }

  .stat-value {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    color: var(--game-primary-dark);
  }

  .stat-label {
    font-size: clamp(11px, 2.5vw, 13px);
    color: var(--game-primary);
    font-weight: 600;
    margin-top: 4px;
  }

  .stat-box.success .stat-value { color: var(--game-success); }
  .stat-box.error .stat-value { color: var(--game-error); }

  .final-message {
    font-size: clamp(15px, 3.3vw, 17px);
    line-height: 1.5;
    color: var(--game-text);
    margin: 16px 0;
    padding: 14px;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    font-weight: 600;
    border: 2px solid var(--game-primary);
  }

  /* Адаптивность */
  @media (max-width: 480px) {
    body { padding: 10px; }
    .title-card, .end-card { padding: 24px 16px; }
    .task-card { padding: 16px; }
    .step { padding: 14px; }
    .cat-svg { width: 64px; height: 64px; }
    .btn { padding: 14px 24px; min-height: 52px; }
    .corner-decor { width: 60px; height: 60px; }
    .chest-svg { width: 140px; height: 110px; }
    .stats-grid { gap: 6px; }
    .stat-box { padding: 10px 6px; }
  }

  @media (min-width: 768px) {
    .screen { padding: 20px; }
  }
</style>
</head>
<body>

<!-- Декоративные углы карты -->
<svg class="corner-decor corner-tl" viewBox="0 0 100 100">
  <path d="M 5 5 L 40 5 Q 50 5 50 15 L 50 30 Q 50 40 40 40 L 20 40 Q 5 40 5 25 Z" fill="none" stroke="#6b4423" stroke-width="3"/>
  <path d="M 15 15 L 35 15 M 15 25 L 30 25" stroke="#6b4423" stroke-width="2"/>
  <circle cx="70" cy="70" r="15" fill="none" stroke="#6b4423" stroke-width="2"/>
  <path d="M 70 55 L 70 85 M 55 70 L 85 70" stroke="#6b4423" stroke-width="2"/>
</svg>
<svg class="corner-decor corner-tr" viewBox="0 0 100 100">

<!-- Оверлей обратной связи -->
<div class="feedback-overlay" id="feedback-overlay"></div>

<script>
  // ===== ДАННЫЕ ЗАДАЧИ =====
  const taskText = "У пирата 2 сундука. В каждом сундуке по 4 мешочка. В каждом мешочке по 2 золотые монеты. Пират разделил все монеты поровну между 4 матросами.";

  const steps = [
    {
      question: "Сколько всего мешочков?",
      answer: 8,
      hint: "Умножь количество сундуков (2) на количество мешочков в каждом (4).",
      unit: "меш."
    },
    {
      question: "Сколько золотых монет в одном сундуке?",
      answer: 8,
      hint: "Умножь количество мешочков в сундуке (4) на число монет в мешочке (2).",
      unit: "мон."
    },
    {
      question: "Сколько всего золотых монет у пирата?",
      answer: 16,
      hint: "Умножь количество сундуков (2) на число монет в одном сундуке.",
      unit: "мон."
    },
    {
      question: "Пират разделил все монеты поровну между 4 матросами. Сколько монет получил каждый матрос?",
      answer: 4,
      hint: "Раздели общее число монет (16) на количество матросов (4).",
      unit: "мон."
    },
    {
      question: "Сколько монет получили 3 матроса?",
      answer: 12,
      hint: "Умножь число монет одного матроса (4) на 3.",
      unit: "мон."
    }
  ];

  // ===== РЕПЛИКИ КОТА =====
  const catPhrases = {
    correct: [
      "Мяу! Верно! Ты настоящий пират!",
      "Ура! Сокровища ближе! ⭐",
      "Отличный ход, капитан!",
      "Так держать! Сундук почти открыт!"
    ],
    wrong: [
      "Мяу, не совсем… Попробуй ещё разок!",
      "Не сдавайся, капитан! Ты сможешь!",
      "Почти получилось! Подумай ещё.",
      "Ой, ошибочка! Давай снова!"
    ],
    hint: [
      "Загляни в карту, капитан!",
      "Держи подсказку! Она поможет.",
      "Я подскажу, смотри внимательно!",
      "Вот тебе подсказка, мяу!"
    ],
    final: [
      "Ты нашёл все сокровища! Мяу-ура!",
      "Победа, капитан! Сундук твой!",
      "Ты супер-пират! Так держать!",
      "Все монеты пересчитаны! Отличная работа!"
    ]
  };

  // ===== СОСТОЯНИЕ ИГРЫ =====
  let currentStep = 0;
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let stepAttempts = [];
  let audioCtx = null;

  // ===== ЗВУКИ =====
  function getAudioContext() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return null; }
    }
    return audioCtx;
  }

  function playSuccessSound() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now + i * 0.1);
      gain.gain.setValueAtTime(0, now + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.25, now + i * 0.1 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.25);
      osc.start(now + i * 0.1);
      osc.stop(now + i * 0.1 + 0.3);
    });
  }

  function playErrorSound() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.start(now);
    osc.stop(now + 0.4);
  }

  function playFinalSound() {
    const ctx = getAudioContext();
    if (!ctx) return;
    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, now + i * 0.12);
      gain.gain.setValueAtTime(0, now + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.3, now + i * 0.12 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.4);
      osc.start(now + i * 0.12);
      osc.stop(now + i * 0.12 + 0.45);
    });
  }

  // ===== УТИЛИТЫ =====
  function randomPhrase(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function setCatBubble(text) {
    document.getElementById('cat-bubble').textContent = text;
  }

  function updateScore() {
    document.getElementById('score-value').textContent = score;
  }

  function showFeedback(emoji) {
    const overlay = document.getElementById('feedback-overlay');
    overlay.textContent = emoji;
    overlay.classList.remove('show');
    void overlay.offsetWidth;
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 900);
  }

  // ===== СОЗДАНИЕ ШАГОВ =====
  function buildSteps() {
    const container = document.getElementById('steps-container');
    container.innerHTML = '';
    steps.forEach((step, idx) => {
      const stepEl = document.createElement('div');
      stepEl.className = 'step' + (idx === 0 ? ' active' : '');
      stepEl.id = 'step-' + idx;
      stepEl.innerHTML = `
        <div class="step-header">
          <div class="step-number">${idx + 1}</div>
          <div class="step-question">${step.question}</div>
        </div>
        <div class="step-input-row">
          <input type="number" class="step-input" id="input-${idx}" placeholder="Ответ" inputmode="numeric">
          <span class="step-unit">${step.unit}</span>
          <button class="btn btn-check" id="btn-${idx}" onclick="checkStep(${idx})">Проверить</button>
        </div>
        <div class="step-hint" id="hint-${idx}">💡 ${step.hint}</div>
        <div class="step-answer-reveal" id="reveal-${idx}"></div>
        <div class="step-status" id="status-${idx}"></div>
      `;
      container.appendChild(stepEl);
    });

    steps.forEach((_, idx) => {
      const input = document.getElementById('input-' + idx);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkStep(idx);
        }
      });
    });
  }

  // ===== ПРОВЕРКА ШАГА =====
  function checkStep(idx) {
    const input = document.getElementById('input-' + idx);
    const value = parseInt(input.value, 10);
    const stepEl = document.getElementById('step-' + idx);
    const hintEl = document.getElementById('hint-' + idx);
    const revealEl = document.getElementById('reveal-' + idx);
    const statusEl = document.getElementById('status-' + idx);
    const btn = document.getElementById('btn-' + idx);

    if (isNaN(value)) {
      stepEl.classList.add('shake');
      setTimeout(() => stepEl.classList.remove('shake'), 500);
      return;
    }

    if (value === steps[idx].answer) {
      input.classList.remove('incorrect');
      input.classList.add('correct');
      input.disabled = true;
      btn.disabled = true;
      stepEl.classList.remove('active');
      stepEl.classList.add('completed', 'success-pulse');
      setTimeout(() => stepEl.classList.remove('success-pulse'), 600);

      score += 1;
      correctCount += 1;
      updateScore();

      setCatBubble(randomPhrase(catPhrases.correct));
      showFeedback('👏');
      playSuccessSound();

      statusEl.innerHTML = '✓ Верно!';
      statusEl.className = 'step-status show correct';

      setTimeout(() => {
        if (idx + 1 < steps.length) {
          const nextStep = document.getElementById('step-' + (idx + 1));
          nextStep.classList.add('active');
          currentStep = idx + 1;
          document.getElementById('current-step-num').textContent = currentStep + 1;
          document.getElementById('input-' + (idx + 1)).focus();
          setCatBubble(randomPhrase(catPhrases.correct));
        } else {
          setTimeout(() => showEndScreen(), 900);
        }
      }, 700);

    } else {
      wrongCount += 1;
      stepAttempts[idx] = (stepAttempts[idx] || 0) + 1;

      input.classList.add('incorrect');
      stepEl.classList.add('shake');
      setTimeout(() => stepEl.classList.remove('shake'), 500);

      showFeedback('❌');
      playErrorSound();

      statusEl.innerHTML = '✗ Неверно. Попробуй ещё!';
      statusEl.className = 'step-status show incorrect';

      if (stepAttempts[idx] >= 1) {
        hintEl.classList.add('show');
        setCatBubble(randomPhrase(catPhrases.hint));
      } else {
        setCatBubble(randomPhrase(catPhrases.wrong));
      }

      if (stepAttempts[idx] >= 2) {
        revealEl.innerHTML = '✦ Правильный ответ: <strong>' + steps[idx].answer + ' ' + steps[idx].unit + '</strong>';
        revealEl.classList.add('show');
        input.value = steps[idx].answer;
        input.classList.remove('incorrect');
        input.classList.add('correct');
        input.disabled = true;
        btn.disabled = true;
        stepEl.classList.remove('active');
        stepEl.classList.add('completed');
        statusEl.innerHTML = '✗ Показан верный ответ';
        statusEl.className = 'step-status show incorrect';

        setTimeout(() => {
          if (idx + 1 < steps.length) {
            const nextStep = document.getElementById('step-' + (idx + 1));
            nextStep.classList.add('active');
            currentStep = idx + 1;
            document.getElementById('current-step-num').textContent = currentStep + 1;
            document.getElementById('input-' + (idx + 1)).focus();
          } else {
            setTimeout(() => showEndScreen(), 700);
          }
        }, 1200);
      } else {
        input.value = '';
        input.focus();
      }
    }
  }

  // ===== ФИНАЛЬНЫЙ ЭКРАН =====
  function showEndScreen() {
    showScreen('end-screen');
    playFinalSound();

    const starsRow = document.getElementById('stars-row');
    let starCount = 1;
    if (correctCount >= 5) starCount = 3;
    else if (correctCount >= 3) starCount = 2;

    starsRow.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const star = document.createElement('span');
      star.className = 'star ' + (i < starCount ? 'active' : 'inactive');
      star.textContent = '⭐';
      starsRow.appendChild(star);
    }

    document.getElementById('stat-correct').textContent = correctCount;
    document.getElementById('stat-wrong').textContent = wrongCount;
    document.getElementById('stat-score').textContent = score;

    const msg = document.getElementById('final-message');
    let finalText = randomPhrase(catPhrases.final) + '<br><br>';
    if (starCount === 3) {
      finalText += '🌟 Великолепно! Ты настоящий мастер математики!';
    } else if (starCount === 2) {
      finalText += '👍 Хорошая работа! Ещё немного практики — и будет идеально!';
    } else {
      finalText += '💪 Не сдавайся! Попробуй ещё раз — у тебя получится лучше!';
    }
    msg.innerHTML = finalText;
  }

  // ===== УПРАВЛЕНИЕ ИГРОЙ =====
  function startGame() {
    getAudioContext();

    currentStep = 0;
    score = 0;
    correctCount = 0;
    wrongCount = 0;
    stepAttempts = [];

    document.getElementById('task-text').textContent = taskText;
    document.getElementById('total-steps').textContent = steps.length;
    document.getElementById('current-step-num').textContent = 1;
    updateScore();
    buildSteps();
    setCatBubble('Мяу! Привет, капитан! Давай решим задачу по шагам!');

    showScreen('game-screen');
    setTimeout(() => {
      const firstInput = document.getElementById('input-0');
      if (firstInput) firstInput.focus();
    }, 300);
  }

  function restartGame() {
    startGame();
  }
</script>
