<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Своя игра: Фонетика 2 класс</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Comic Sans MS', 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 15px;
    color: #fff;
  }
  
  h1 {
    text-align: center;
    font-size: 2.2em;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    margin-bottom: 10px;
  }
  
  .subtitle {
    text-align: center;
    font-size: 1.2em;
    margin-bottom: 20px;
    opacity: 0.9;
  }
  
  .score-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }
  
  .score-display {
    background: rgba(255,255,255,0.2);
    padding: 15px 35px;
    border-radius: 20px;
    font-size: 1.5em;
    font-weight: bold;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
  }
  
  .score-display span {
    color: #fbbf24;
    font-size: 1.3em;
  }
  
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 1100px;
    margin: 0 auto 25px;
  }
  
  .category {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    padding: 15px 8px;
    text-align: center;
    border-radius: 12px;
    font-weight: bold;
    font-size: 0.95em;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    min-height: 85px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .cell {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    padding: 20px;
    text-align: center;
    border-radius: 12px;
    font-size: 1.8em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.2s;
    min-height: 85px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  
  .cell:hover:not(.used) {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  
  .cell.used {
    background: #555;
    color: #888;
    cursor: not-allowed;
    box-shadow: none;
    opacity: 0.5;
  }
  
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .modal.active { display: flex; }
  
  .modal-content {
    background: linear-gradient(135deg, #fff 0%, #fef3c7 100%);
    color: #333;
    padding: 35px;
    border-radius: 25px;
    max-width: 650px;
    width: 100%;
    text-align: center;
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    animation: pop 0.3s ease-out;
  }
  
  @keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  
  .modal h2 {
    color: #764ba2;
    margin-bottom: 15px;
    font-size: 1.4em;
  }
  
  .modal .question {
    font-size: 1.4em;
    margin: 20px 0;
    color: #333;
    line-height: 1.4;
    font-weight: bold;
  }
  
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 25px 0;
  }
  
  .answer-btn {
    padding: 18px;
    font-size: 1.15em;
    font-weight: bold;
    border: 3px solid #764ba2;
    background: #fff;
    color: #764ba2;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  
  .answer-btn:hover:not(:disabled) {
    background: #764ba2;
    color: #fff;
    transform: scale(1.05);
  }
  
  .answer-btn.correct {
    background: #4ade80 !important;
    color: #064e3b !important;
    border-color: #059669 !important;
    animation: correctAnim 0.5s;
  }
  
  .answer-btn.wrong {
    background: #f87171 !important;
    color: #fff !important;
    border-color: #dc2626 !important;
    animation: shake 0.5s;
  }
  
  @keyframes correctAnim {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  
  .feedback {
    font-size: 1.5em;
    font-weight: bold;
    margin: 15px 0;
    min-height: 40px;
  }
  
  .feedback.correct { color: #059669; }
  .feedback.wrong { color: #dc2626; }
  
  .btn-next {
    padding: 12px 35px;
    font-size: 1.2em;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: #fff;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    display: none;
    font-family: inherit;
  }
  
  .btn-next:hover { transform: scale(1.05); }
  
  .controls {
    text-align: center;
  }
  
  .btn-reset, .btn-final {
    background: linear-gradient(135deg, #64748b 0%, #475569 100%);
    color: #fff;
    font-size: 1.1em;
    padding: 12px 30px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    margin: 8px;
    font-family: inherit;
  }
  
  .btn-final {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  }
  
  .btn-reset:hover, .btn-final:hover { transform: translateY(-3px); }
  
  @media (max-width: 700px) {
    .board { grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .category { font-size: 0.75em; min-height: 70px; padding: 8px 4px; }
    .cell { font-size: 1.3em; min-height: 70px; padding: 12px; }
    .answers { grid-template-columns: 1fr; }
    h1 { font-size: 1.5em; }
  }
</style>
</head>
<body>

<h1>🎲 СВОЯ ИГРА 🎲</h1>
<div class="subtitle">Тайны звуков и букв • 2 класс</div>

<div class="score-bar">
  <div class="score-display">⭐ Твои очки: <span id="totalScore">0</span></div>
</div>

<div class="board" id="board"></div>

<div class="controls">
  <button class="btn-final" onclick="finalQuestion()">🏆 ФИНАЛЬНЫЙ ВОПРОС</button>
  <button class="btn-reset" onclick="resetGame()">🔄 Новая игра</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modal-category"></h2>
    <div class="question" id="modal-question"></div>
    <div id="answers-container"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="closeModal()">Дальше ➡️</button>
  </div>
</div>

<script>
const gameData = {
  "🍭 Гласные": [
    {q:"В слове ДОМ какая гласная под ударением?", opts:["А","О","У","И"], correct:1, pts:10},
    {q:"Сколько гласных звуков в слове АИСТ?", opts:["1","2","3","4"], correct:1, pts:20},
    {q:"В каком слове ударение на 2-м слоге?", opts:["МАМА","ПАПА","СОБАКА","КОТ"], correct:2, pts:30},
    {q:"Сколько гласных звуков в слове ЁЖИК?", opts:["1","2","3","4"], correct:1, pts:40},
    {q:"В слове УЛИЦА сколько гласных звуков?", opts:["1","2","3","4"], correct:2, pts:50}
  ],
  "🧊 Твёрдые и мягкие": [
    {q:"Какая буква делает согласный мягким?", opts:["Ы","Ь","Ъ","Й"], correct:1, pts:10},
    {q:"В слове МИШКА какой согласный мягкий?", opts:["Ш","К","М","НЕТ"], correct:2, pts:20},
    {q:"Где все согласные твёрдые?", opts:["КИТ","МЯЧ","КОТ","ЛЕС"], correct:2, pts:30},
    {q:"Буква И делает согласный каким?", opts:["Твёрдым","Мягким","Звонким","Глухим"], correct:1, pts:40},
    {q:"Сколько мягких согласных в слове ПЕНЬКИ?", opts:["0","1","2","3"], correct:3, pts:50}
  ],
  "🤫 Звонкие и глухие": [
    {q:"Звук [К] в слове КОТ — какой?", opts:["Звонкий","Глухой","Мягкий","Нет звука"], correct:1, pts:10},
    {q:"Какой глухой согласный в слове ЖУК?", opts:["Ж","У","К","Ч"], correct:2, pts:20},
    {q:"Какой звук слышим в конце слова ДУБ?", opts:["Б","П","Д","Т"], correct:1, pts:30},
    {q:"Сколько глухих согласных в слове ДОМ?", opts:["0","1","2","3"], correct:0, pts:40},
    {q:"Проверочное слово к СНЕГ?", opts:["СНЕЖОК","СНЕГА","СНЕГУРКА","СНЕДА"], correct:1, pts:50}
  ],
  "🎭 Буква и Звук": [
    {q:"Буква Ь обозначает звук?", opts:["Да","Нет","Иногда","Только в начале"], correct:1, pts:10},
    {q:"Сколько звуков в букве Ё (ЁЛКА)?", opts:["1","2","3","0"], correct:1, pts:20},
    {q:"Сколько звуков в букве Я (ЯМА)?", opts:["1","2","3","0"], correct:1, pts:30},
    {q:"В слове МЯЧ сколько букв и звуков?", opts:["3б, 3зв","3б, 4зв","4б, 4зв","4б, 3зв"], correct:0, pts:40},
    {q:"В слове ЮГ сколько букв и звуков?", opts:["2б, 2зв","2б, 3зв","3б, 3зв","3б, 2зв"], correct:1, pts:50}
  ],
  "🧩 Собираем слова": [
    {q:"Сколько слогов в слове МАМА?", opts:["1","2","3","4"], correct:1, pts:10},
    {q:"Сколько слогов в слове ПАРТА?", opts:["1","2","3","4"], correct:1, pts:20},
    {q:"Где правильное ударение?", opts:["мОлоко","молоко́","молОко"], correct:1, pts:30},
    {q:"Собери слово из слогов: РА, КУ, ШКА", opts:["КУРАШКА","РАКУШКА","ШКАРАКУ","КУРАША"], correct:1, pts:40},
    {q:"Слово из 3 слогов, ударение на последний:", opts:["КОРОВА","МАШИНА","СОБАКА","КАРАНДАШ"], correct:3, pts:50}
  ]
};

const categories = Object.keys(gameData);
let currentCell = null;
let totalScore = 0;
let answered = false;

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  
  categories.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    catDiv.textContent = cat;
    board.appendChild(catDiv);
  });
  
  const points = [10, 20, 30, 40, 50];
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < categories.length; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = points[row];
      cell.dataset.col = col;
      cell.dataset.row = row;
      cell.onclick = function() {
        openQuestion(col, row, this);
      };
      board.appendChild(cell);
    }
  }
}

function openQuestion(col, row, cell) {
  if (cell.classList.contains('used')) return;
  
  const cat = categories[col];
  const q = gameData[cat][row];
  
  currentCell = cell;
  answered = false;
  
  document.getElementById('modal-category').textContent = cat + ' — ' + q.pts + ' очков';
  document.getElementById('modal-question').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  
  const container = document.getElementById('answers-container');
  container.innerHTML = '<div class="answers"></div>';
  const answersDiv = container.querySelector('.answers');
  
  q.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(idx, q.correct, q.pts, btn, answersDiv);
    answersDiv.appendChild(btn);
  });
  
  document.getElementById('modal').classList.add('active');
}

function checkAnswer(selected, correct, pts, btn, container) {
  if (answered) return;
  answered = true;
  
  const buttons = container.querySelectorAll('.answer-btn');
  buttons.forEach(b => b.disabled = true);
  
  const feedback = document.getElementById('feedback');
  
  if (selected === correct) {
    btn.classList.add('correct');
    feedback.textContent = '✅ Правильно! +' + pts + ' очков';
    feedback.className = 'feedback correct';
    totalScore += pts;
  } else {
    btn.classList.add('wrong');
    buttons[correct].classList.add('correct');
    feedback.textContent = '❌ Неправильно! Правильный ответ выделен зелёным.';
    feedback.className = 'feedback wrong';
  }
  
  document.getElementById('totalScore').textContent = totalScore;
  document.getElementById('btn-next').style.display = 'inline-block';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  if (currentCell) {
    currentCell.classList.add('used');
    currentCell.textContent = '✓';
    currentCell = null;
  }
}

function finalQuestion() {
  currentCell = null;
  answered = false;
  
  document.getElementById('modal-category').textContent = '🏆 ФИНАЛЬНЫЙ ВОПРОС';
  document.getElementById('modal-question').textContent = 'В слове СЕМЬЯ сколько букв и сколько звуков?';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  
  const container = document.getElementById('answers-container');
  container.innerHTML = '<div class="answers"></div>';
  const answersDiv = container.querySelector('.answers');
  
  const opts = ["6 букв, 6 звуков","6 букв, 7 звуков","7 букв, 7 звуков","6 букв, 5 звуков"];
  const correct = 1;
  
  opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const buttons = answersDiv.querySelectorAll('.answer-btn');
      buttons.forEach(b => b.disabled = true);
      const feedback = document.getElementById('feedback');
      
      if (idx === correct) {
        btn.classList.add('correct');
        feedback.innerHTML = '✅ Верно! Ь не даёт звука, а Я после гласной = 2 звука.<br>⭐ +100 очков!';
        feedback.className = 'feedback correct';
        totalScore += 100;
      } else {
        btn.classList.add('wrong');
        buttons[correct].classList.add('correct');
        feedback.innerHTML = '❌ Правильно: 6 букв и 7 звуков.<br>Ь не даёт звука, Я после гласной = 2 звука.';
        feedback.className = 'feedback wrong';
      }
      document.getElementById('totalScore').textContent = totalScore;
      document.getElementById('btn-next').style.display = 'inline-block';
    };
    answersDiv.appendChild(btn);
  });
  
  document.getElementById('modal').classList.add('active');
}

function resetGame() {
  if (!confirm('Начать новую игру? Все результаты будут сброшены.')) return;
  totalScore = 0;
  document.getElementById('totalScore').textContent = '0';
  createBoard();
}

createBoard();
</script>

</body>
</html>
