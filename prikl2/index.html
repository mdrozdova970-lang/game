<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математическое Приключение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-item {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .problem-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .problem-number {
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .problem-text {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.6;
        }

        .input-group {
            margin: 15px 0;
        }

        input[type="text"], input[type="number"] {
            padding: 12px;
            border: 3px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            width: 100%;
            max-width: 300px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            padding: 10px;
            border: 3px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            background: white;
            cursor: pointer;
            margin: 0 5px;
            min-width: 60px;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
        }

        .correct {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .option-btn {
            background: #e9ecef;
            color: #333;
            padding: 10px 20px;
            border: 2px solid #dee2e6;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }

        .hidden {
            display: none;
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .floating {
            animation: float 2s ease-in-out infinite;
        }

        .hint {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            color: #856404;
        }

        .equation-row {
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .number {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            .game-container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Математическое Приключение</h1>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>

        <div class="score-board">
            <div class="score-item">⭐ Очки: <span id="score">0</span></div>
            <div class="score-item"> Задание: <span id="currentProblem">1</span>/7</div>
            <div class="score-item">❤️ Жизни: <span id="lives">3</span></div>
        </div>

        <div id="gameArea">
            <!-- Problems will be inserted here -->
        </div>

        <div id="finalScreen" class="hidden" style="text-align: center;">
            <h2 style="color: #667eea; margin-bottom: 20px;">🎉 Поздравляем!</h2>
            <p style="font-size: 1.3em; margin-bottom: 20px;">
                Вы完成了 все задания!<br>
                Ваш результат: <span id="finalScore" style="font-weight: bold; color: #764ba2;"></span>
            </p>
            <button onclick="location.reload()">🔄 Начать заново</button>
        </div>
    </div>

    <script>
        let currentProblem = 1;
        let score = 0;
        let lives = 3;
        const totalProblems = 7;

        const problems = [
            {
                type: 'word',
                question: 'Для ремонта квартиры купили 20 рулонов жёлтых обоев и 15 рулонов коричневых обоев. Сколько рулонов обоев осталось наклеить, если уже наклеили 25 рулонов?',
                answer: 10,
                hint: 'Сначала сложи все рулоны, потом вычти наклеенные'
            },
            {
                type: 'calculation',
                questions: [
                    { expr: '60 + (30 - 6)', answer: 84 },
                    { expr: '45 + 28', answer: 73 },
                    { expr: '14 : 2 × 3', answer: 21 },
                    { expr: '(40 - 13) + 9', answer: 36 },
                    { expr: '63 - 37', answer: 26 },
                    { expr: '60 - 6 × 3', answer: 42 }
                ]
            },
            {
                type: 'compare',
                questions: [
                    { expr1: '3 × 6', expr2: '3 × 9', correct: '<' },
                    { expr1: '18 : 2', expr2: '27 : 3', correct: '=' },
                    { expr1: '5 × 7', expr2: '81 : 9', correct: '>' }
                ]
            },
            {
                type: 'equation',
                questions: [
                    { expr: '6 × y = 12', answer: 2, variable: 'y' },
                    { expr: 'x : 3 = 8', answer: 24, variable: 'x' }
                ]
            },
            {
                type: 'drawing',
                question: 'Начертите отрезок длиной 5см 8мм',
                answer: '5.8'
            },
            {
                type: 'logic',
                question: 'Катя старше Юли и моложе Димы. Кто из детей моложе всех?',
                options: ['Катя', 'Юля', 'Дима'],
                correct: 'Юля',
                hint: 'Катя > Юля, Дима > Катя. Значит: Дима > Катя > Юля'
            },
            {
                type: 'signs',
                questions: [
                    { 
                        numbers: [9, 7, 9, 6, 9], 
                        result: 63,
                        correct: ['×', '=', '+', '×']
                    },
                    { 
                        numbers: [5, 8, 5, 7, 5], 
                        result: 13,
                        correct: ['+', '=', '+', '+']
                    }
                ]
            }
        ];

        function updateProgress() {
            const progress = ((currentProblem - 1) / totalProblems) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('currentProblem').textContent = currentProblem;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function showFeedback(isCorrect, message) {
            const feedback = document.createElement('div');
            feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
            feedback.textContent = message;
            feedback.style.display = 'block';
            
            const gameArea = document.getElementById('gameArea');
            gameArea.appendChild(feedback);
            
            setTimeout(() => {
                feedback.remove();
            }, 3000);
        }

        function nextProblem() {
            currentProblem++;
            if (currentProblem > totalProblems) {
                showFinalScreen();
            } else {
                loadProblem();
            }
            updateProgress();
        }

        function showFinalScreen() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('finalScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score + ' из ' + (totalProblems * 10);
            
            if (score >= totalProblems * 8) {
                createCelebration();
            }
        }

        function createCelebration() {
            const colors = ['#f093fb', '#f5576c', '#667eea', '#764ba2', '#4facfe', '#00f2fe'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.width = '10px';
                    confetti.style.height = '10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.borderRadius = '50%';
                    confetti.style.zIndex = '1000';
                    confetti.style.pointerEvents = 'none';
                    document.body.appendChild(confetti);
                    
                    const duration = Math.random() * 3 + 2;
                    confetti.animate([
                        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                        { transform: `translateY(100vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                    ], {
                        duration: duration * 1000,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    }).onfinish = () => confetti.remove();
                }, i * 50);
            }
        }

        function loadProblem() {
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = '';
            
            const problem = problems[currentProblem - 1];
            const container = document.createElement('div');
            container.className = 'problem-container floating';
            
            const number = document.createElement('div');
            number.className = 'problem-number';
            number.textContent = currentProblem;
            container.appendChild(number);
            
            if (problem.type === 'word') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = problem.question;
                container.appendChild(text);
                
                const input = document.createElement('input');
                input.type = 'number';
                input.placeholder = 'Ваш ответ';
                container.appendChild(input);
                
                const btn = document.createElement('button');
                btn.textContent = 'Проверить';
                btn.onclick = () => {
                    const userAnswer = parseInt(input.value);
                    if (userAnswer === problem.answer) {
                        score += 10;
                        showFeedback(true, 'Правильно! Молодец! ');
                        setTimeout(nextProblem, 1500);
                    } else {
                        lives--;
                        showFeedback(false, `Неправильно. Правильный ответ: ${problem.answer}`);
                        updateProgress();
                        if (lives <= 0) {
                            setTimeout(showFinalScreen, 1500);
                        }
                    }
                };
                container.appendChild(btn);
                
                const hintBtn = document.createElement('button');
                hintBtn.textContent = '💡 Подсказка';
                hintBtn.onclick = () => {
                    const hint = document.createElement('div');
                    hint.className = 'hint';
                    hint.textContent = problem.hint;
                    container.appendChild(hint);
                };
                container.appendChild(hintBtn);
                
            } else if (problem.type === 'calculation') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = 'Выполните вычисления:';
                container.appendChild(text);
                
                problem.questions.forEach((q, index) => {
                    const div = document.createElement('div');
                    div.style.margin = '10px 0';
                    div.innerHTML = `<strong>${q.expr}</strong> = `;
                    
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.style.width = '100px';
                    input.dataset.answer = q.answer;
                    input.dataset.index = index;
                    div.appendChild(input);
                    
                    container.appendChild(div);
                });
                
                const btn = document.createElement('button');
                btn.textContent = 'Проверить все';
                btn.onclick = () => {
                    let correct = 0;
                    const inputs = container.querySelectorAll('input');
                    inputs.forEach(input => {
                        if (parseInt(input.value) === parseInt(input.dataset.answer)) {
                            input.style.borderColor = '#28a745';
                            correct++;
                        } else {
                            input.style.borderColor = '#dc3545';
                        }
                    });
                    
                    if (correct === problem.questions.length) {
                        score += 10;
                        showFeedback(true, 'Все правильно! Отлично! 🌟');
                        setTimeout(nextProblem, 1500);
                    } else {
                        lives--;
                        showFeedback(false, `Правильно ${correct} из ${problem.questions.length}`);
                        updateProgress();
                    }
                };
                container.appendChild(btn);
                
            } else if (problem.type === 'compare') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = 'Сравните выражения (выберите <, > или =):';
                container.appendChild(text);
                
                problem.questions.forEach((q, index) => {
                    const div = document.createElement('div');
                    div.style.margin = '15px 0';
                    div.innerHTML = `
                        <span style="font-weight: bold">${q.expr1}</span> 
                        <select data-index="${index}" data-correct="${q.correct}" style="padding: 5px; margin: 0 10px; font-size: 1.1em;">
                            <option value="">?</option>
                            <option value="<">&lt;</option>
                            <option value=">">&gt;</option>
                            <option value="=">=</option>
                        </select>
                        <span style="font-weight: bold">${q.expr2}</span>
                    `;
                    container.appendChild(div);
                });
                
                const btn = document.createElement('button');
                btn.textContent = 'Проверить';
                btn.onclick = () => {
                    let correct = 0;
                    const selects = container.querySelectorAll('select');
                    selects.forEach(select => {
                        if (select.value === select.dataset.correct) {
                            select.style.borderColor = '#28a745';
                            correct++;
                        } else {
                            select.style.borderColor = '#dc3545';
                        }
                    });
                    
                    if (correct === problem.questions.length) {
                        score += 10;
                        showFeedback(true, 'Все сравнения верны! ✅');
                        setTimeout(nextProblem, 1500);
                    } else {
                        lives--;
                        showFeedback(false, `Правильно ${correct} из ${problem.questions.length}`);
                        updateProgress();
                    }
                };
                container.appendChild(btn);
                
            } else if (problem.type === 'equation') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = 'Решите уравнения:';
                container.appendChild(text);
                
                problem.questions.forEach((q, index) => {
                    const div = document.createElement('div');
                    div.style.margin = '15px 0';
                    div.innerHTML = `
                        <strong>${q.expr}</strong><br>
                        ${q.variable} = 
                        <input type="number" data-answer="${q.answer}" style="width: 100px; margin-left: 10px;">
                    `;
                    container.appendChild(div);
                });
                
                const btn = document.createElement('button');
                btn.textContent = 'Проверить';
                btn.onclick = () => {
                    let correct = 0;
                    const inputs = container.querySelectorAll('input');
                    inputs.forEach(input => {
                        if (parseInt(input.value) === parseInt(input.dataset.answer)) {
                            input.style.borderColor = '#28a745';
                            correct++;
                        } else {
                            input.style.borderColor = '#dc3545';
                        }
                    });
                    
                    if (correct === problem.questions.length) {
                        score += 10;
                        showFeedback(true, 'Уравнения решены верно! ');
                        setTimeout(nextProblem, 1500);
                    } else {
                        lives--;
                        showFeedback(false, `Правильно ${correct} из ${problem.questions.length}`);
                        updateProgress();
                    }
                };
                container.appendChild(btn);
                
            } else if (problem.type === 'drawing') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = problem.question;
                container.appendChild(text);
                
                const info = document.createElement('div');
                info.style.background = '#e3f2fd';
                info.style.padding = '10px';
                info.style.borderRadius = '10px';
                info.style.marginBottom = '10px';
                info.textContent = '💡 Подсказка: 5см 8мм = 5.8см';
                container.appendChild(info);
                
                const btn = document.createElement('button');
                btn.textContent = 'Я начертил(а)';
                btn.onclick = () => {
                    score += 10;
                    showFeedback(true, 'Молодец! Не забудь проверить линейкой! 📏');
                    setTimeout(nextProblem, 1500);
                };
                container.appendChild(btn);
                
            } else if (problem.type === 'logic') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = problem.question;
                container.appendChild(text);
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';
                problem.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => {
                        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        btn.dataset.selected = opt;
                    };
                    optionsDiv.appendChild(btn);
                });
                container.appendChild(optionsDiv);
                
                const checkBtn = document.createElement('button');
                checkBtn.textContent = 'Проверить';
                checkBtn.onclick = () => {
                    const selected = document.querySelector('.option-btn.selected');
                    if (!selected) {
                        alert('Выберите вариант ответа!');
                        return;
                    }
                    
                    if (selected.dataset.selected === problem.correct) {
                        score += 10;
                        showFeedback(true, 'Логическое мышление на высоте! ');
                        setTimeout(nextProblem, 1500);
                    } else {
                        lives--;
                        showFeedback(false, `Неправильно. Правильный ответ: ${problem.correct}`);
                        updateProgress();
                    }
                };
                container.appendChild(checkBtn);
                
                const hintBtn = document.createElement('button');
                hintBtn.textContent = '💡 Подсказка';
                hintBtn.onclick = () => {
                    const hint = document.createElement('div');
                    hint.className = 'hint';
                    hint.textContent = problem.hint;
                    container.appendChild(hint);
                };
                container.appendChild(hintBtn);
                
            } else if (problem.type === 'signs') {
                const text = document.createElement('div');
                text.className = 'problem-text';
                text.textContent = 'Вставьте знаки действий, чтобы равенство стало верным:';
                container.appendChild(text);
                
                problem.questions.forEach((q, index) => {
                    const row = document.createElement('div');
                    row.className = 'equation-row';
                    
                    // Create equation with dropdowns
                    // Format: num1 op1 num2 = num3 op2 num4 op3 num5
                    // For example: 9 [×] 7 [=] 9 [+] 6 [×] 9
                    
                    const ops = ['+', '-', '×', ':'];
                    
                    // First number
                    row.innerHTML += `<span class="number">${q.numbers[0]}</span>`;
                    
                    // First operator dropdown
                    row.innerHTML += `
                        <select data-q="${index}" data-pos="0">
                            <option value="">?</option>
                            ${ops.map(op => `<option value="${op}">${op}</option>`).join('')}
                        </select>
                    `;
                    
                    // Second number
                    row.innerHTML += `<span class="number">${q.numbers[1]}</span>`;
                    
                    // Equals sign
                    row.innerHTML += `<span>=</span>`;
                    
                    // Third number
                    row.innerHTML += `<span class="number">${q.numbers[2]}</span>`;
                    
                    // Second operator dropdown
                    row.innerHTML += `
                        <select data-q="${index}" data-pos="1">
                            <option value="">?</option>
                            ${ops.map(op => `<option value="${op}">${op}</option>`).join('')}
                        </select>
                    `;
                    
                    // Fourth number
                    row.innerHTML += `<span class="number">${q.numbers[3]}</span>`;
                    
                    // Third operator dropdown
                    row.innerHTML += `
                        <select data-q="${index}" data-pos="2">
                            <option value="">?</option>
                            ${ops.map(op => `<option value="${op}">${op}</option>`).join('')}
                        </select>
                    `;
                    
                    // Fifth number
                    row.innerHTML += `<span class="number">${q.numbers[4]}</span>`;
                    
                    container.appendChild(row);
                });
                
                const btn = document.createElement('button');
                btn.textContent = 'Проверить';
                btn.onclick = () => {
                    let allCorrect = true;
                    
                    problem.questions.forEach((q, qIndex) => {
                        const selects = container.querySelectorAll(`select[data-q="${qIndex}"]`);
                        let userAnswers = [];
                        
                        selects.forEach(select => {
                            userAnswers.push(select.value);
                            if (select.value !== q.correct[select.dataset.pos]) {
                                select.style.borderColor = '#dc3545';
                                allCorrect = false;
                            } else {
                                select.style.borderColor = '#28a745';
                            }
                        });
                    });
                    
                    if (allCorrect) {
                        score += 10;
                        showFeedback(true, 'Знаки расставлены верно! ✨');
                        setTimeout(nextProblem, 1500);
                    } else {
                        lives--;
                        showFeedback(false, 'Есть ошибки. Попробуйте ещё раз!');
                        updateProgress();
                    }
                };
                container.appendChild(btn);
                
                const hintBtn = document.createElement('button');
                hintBtn.textContent = '💡 Подсказка';
                hintBtn.onclick = () => {
                    const hint = document.createElement('div');
                    hint.className = 'hint';
                    hint.textContent = 'Попробуйте разные комбинации знаков: +, -, ×, :';
                    container.appendChild(hint);
                };
                container.appendChild(hintBtn);
            }
            
            gameArea.appendChild(container);
        }

        // Initialize game
        updateProgress();
        loadProblem();
    </script>
</body>
</html>
