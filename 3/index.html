<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мемори - Таблица умножения и деления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.5em;
            font-weight: bold;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 2em;
        }

        .card-back {
            background: white;
            border: 3px solid #667eea;
            color: #333;
            transform: rotateY(180deg);
        }

        .card.matched .card-back {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .win-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: #d4edda;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #155724;
            font-size: 1.2em;
            font-weight: bold;
        }

        .win-message.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .grid {
                gap: 10px;
            }

            .card-front, .card-back {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Мемори: Умножение и Деление</h1>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Ходы</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Найдено пар</div>
                <div class="stat-value" id="pairs">0 / 8</div>
            </div>
        </div>

        <div class="win-message" id="winMessage">
            🎉 Поздравляем! Вы нашли все пары! 🎉
        </div>

        <div class="grid" id="grid"></div>

        <button class="btn" onclick="initGame()">🔄 Начать заново</button>
    </div>

    <script>
        const pairs = [
            { example: '4 × 6', answer: '24' },
            { example: '4 × 8', answer: '32' },
            { example: '5 × 6', answer: '30' },
            { example: '5 × 8', answer: '40' },
            { example: '6 × 7', answer: '42' },
            { example: '6 × 9', answer: '54' },
            { example: '7 × 8', answer: '56' },
            { example: '7 × 9', answer: '63' }
        ];

        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;

            pairs.forEach((pair, index) => {
                cards.push({ id: index * 2, text: pair.example, pairId: index, type: 'example' });
                cards.push({ id: index * 2 + 1, text: pair.answer, pairId: index, type: 'answer' });
            });

            cards = shuffle(cards);

            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = `${matchedPairs} / 8`;
            document.getElementById('winMessage').classList.remove('show');

            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.dataset.id = card.id;
                
                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${card.text}</div>
                    </div>
                `;

                cardElement.addEventListener('click', () => flipCard(cardElement, card));
                grid.appendChild(cardElement);
            });
        }

        function flipCard(cardElement, card) {
            if (!canFlip || cardElement.classList.contains('flipped') || cardElement.classList.contains('matched')) {
                return;
            }

            cardElement.classList.add('flipped');
            flippedCards.push({ element: cardElement, card: card });

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;

            if (card1.card.pairId === card2.card.pairId) {
                setTimeout(() => {
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('pairs').textContent = `${matchedPairs} / 8`;
                    flippedCards = [];
                    canFlip = true;

                    if (matchedPairs === 8) {
                        setTimeout(() => {
                            document.getElementById('winMessage').classList.add('show');
                        }, 500);
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    card1.element.classList.remove('flipped');
                    card2.element.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        initGame();
    </script>
</body>
</html>
