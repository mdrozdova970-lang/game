<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Тайны текста · Волшебная школа</title>
  <style>
    /* ===== ПЕРЕМЕННЫЕ СТИЛЯ ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #1e1410;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 12px;
    }

    /* Палитра игры — тёмное зельеварение, свечи, старые книги */
    :root {
      --game-bg: #2c1e18;
      --game-card: #3d2b22;
      --game-primary: #c9a87c;
      --game-accent: #9f7c5c;
      --game-text: #f2e0c9;
      --game-success: #9bba7a;
      --game-error: #c47a6a;
      --game-muted: #7a5e4a;
      --game-shadow: rgba(0,0,0,0.7);
      --game-border: #b48b5a;
    }

    .game-wrapper {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      background: var(--game-bg);
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" opacity="0.08"><path d="M50 20 L70 10 90 25 80 45 60 40 40 55 30 30 45 15Z" fill="%23b48b5a"/><circle cx="120" cy="50" r="18" fill="%23b48b5a"/><circle cx="300" cy="80" r="22" fill="%23b48b5a"/><path d="M340 40 L360 30 380 45 370 65 350 60 330 75 320 50 335 35Z" fill="%23b48b5a"/><rect x="20" y="180" width="12" height="40" fill="%23b48b5a" /><rect x="70" y="210" width="12" height="40" fill="%23b48b5a" /><rect x="320" y="190" width="12" height="40" fill="%23b48b5a" /><circle cx="26" cy="170" r="8" fill="%23c9a87c" opacity="0.3"/><circle cx="76" cy="200" r="8" fill="%23c9a87c" opacity="0.3"/><circle cx="326" cy="180" r="8" fill="%23c9a87c" opacity="0.3"/></svg>');
      background-repeat: repeat;
      background-size: 300px 200px;
      border-radius: 42px 42px 32px 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 2px #6b4f3a;
      padding: 20px 16px 24px;
      position: relative;
      border: 6px solid #3d2b1f;
    }

    .candle-deco {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }
    .candle-deco::before {
      content: "🕯️";
      font-size: 32px;
      filter: drop-shadow(0 0 6px #ffb347);
      opacity: 0.35;
    }
    .candle-left { left: 8px; top: 20px; transform: rotate(-10deg); }
    .candle-right { right: 8px; top: 20px; transform: rotate(10deg); }
    .candle-bottom { bottom: 4px; left: 50%; transform: translateX(-50%) scale(0.8); }

    .game-container {
      position: relative;
      z-index: 5;
      background: rgba(30, 20, 16, 0.6);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 16px 12px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
    }

    .progress-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      background: #2a1c15;
      padding: 8px 14px;
      border-radius: 60px;
      border: 1px solid #5f4433;
      box-shadow: inset 0 2px 6px #0c0806;
    }
    .progress-track {
      flex: 1;
      height: 12px;
      background: #3d2b1f;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px #0f0a07;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #b48b5a, #e1c091);
      border-radius: 20px;
      transition: width 0.5s ease;
      box-shadow: 0 0 12px #dbb47a;
    }
    .progress-counter {
      color: var(--game-text);
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 0.5px;
      background: #3d2b1f;
      padding: 3px 12px;
      border-radius: 30px;
      border: 1px solid #735943;
      white-space: nowrap;
      font-family: 'Georgia', serif;
    }

    .stage-panel {
      background: var(--game-card);
      border-radius: 36px;
      padding: 20px 16px;
      border: 2px solid #7a5e4a;
      box-shadow: 0 8px 0 #1f140f, inset 0 0 30px rgba(0,0,0,0.5);
      color: var(--game-text);
      margin: 4px 0 12px;
    }

    .stage-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #f0dbb0;
      text-shadow: 0 2px 4px #0f0805;
      border-bottom: 2px dashed #b48b5a;
      padding-bottom: 8px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.5px;
    }

    .task-text {
      font-size: 1.2rem;
      line-height: 1.6;
      background: #30221b;
      padding: 16px 18px;
      border-radius: 28px;
      border-left: 6px solid #b48b5a;
      margin-bottom: 20px;
      color: #f5e8d4;
      box-shadow: inset 0 2px 8px #0f0805;
    }

    .clickable-word {
      display: inline-block;
      padding: 4px 10px;
      margin: 4px 4px;
      background: #4d3529;
      border-radius: 30px;
      border: 2px solid #7a5e4a;
      cursor: pointer;
      font-weight: 600;
      color: #f2e0c9;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #2d1d15;
      font-size: 1.2rem;
    }
    .clickable-word:hover {
      background: #5f4536;
      transform: scale(1.02);
      border-color: #b48b5a;
    }
    .clickable-word:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #2d1d15;
    }
    .clickable-word.correct-highlight {
      background: #5f7a4a;
      border-color: #b4d48a;
      box-shadow: 0 0 12px #7fa85a;
    }
    .clickable-word.wrong-highlight {
      background: #8f4e3e;
      border-color: #d68a7a;
      box-shadow: 0 0 12px #b55a4a;
    }

    .feedback-box {
      background: #2a1c15;
      border-radius: 24px;
      padding: 14px 18px;
      margin: 16px 0 10px;
      border-left: 8px solid var(--game-primary);
      color: #f0e0c9;
      font-size: 1.05rem;
    }

    .btn {
      background: #5f4433;
      border: none;
      border-bottom: 5px solid #352219;
      color: #f5e8d4;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 14px 24px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s ease;
      box-shadow: 0 4px 0 #1f140f;
      font-family: 'Georgia', serif;
      letter-spacing: 0.8px;
      display: inline-block;
      text-shadow: 0 2px 0 #1f140f;
    }
    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #1f140f;
    }
    .btn-primary {
      background: #b48b5a;
      border-bottom-color: #735943;
      color: #241810;
      text-shadow: 0 1px 0 #e1c091;
    }
    .btn:disabled {
      opacity: 0.5;
      transform: translateY(4px);
      box-shadow: 0 0px 0 #1f140f;
      pointer-events: none;
    }

    .flex-center {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    /* Филворд — сетка 10×10 */
    .wordsearch-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      max-width: 100%;
      margin: 10px auto;
      background: #33251e;
      padding: 10px;
      border-radius: 32px;
      border: 2px solid #6b4f3a;
    }
    .ws-cell {
      aspect-ratio: 1 / 1;
      background: #4d3529;
      color: #f2e0c9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      border-radius: 12px;
      border: 1px solid #6b4f3a;
      transition: 0.15s;
      cursor: pointer;
      box-shadow: inset 0 0 6px #1f140f;
      text-transform: uppercase;
      font-family: 'Georgia', serif;
    }
    .ws-cell.selected {
      background: #6f8f5a;
      border-color: #b4d48a;
      box-shadow: 0 0 12px #7fa85a;
      color: #0f1a08;
    }
    .ws-cell.found {
      background: #3d6a3a;
      border-color: #aad48a;
      color: #d4f0c0;
      box-shadow: 0 0 12px #6f9a5a;
      cursor: default;
    }
    .ws-cell.wrong {
      background: #8f4e3e;
      border-color: #d68a7a;
      box-shadow: 0 0 12px #b55a4a;
    }
    .ws-cell:active {
      transform: scale(0.94);
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      background: #2a1c15;
      padding: 12px 18px;
      border-radius: 40px;
      margin: 12px 0;
      border: 1px solid #5f4433;
      justify-content: center;
    }
    .word-list-item {
      font-size: 1.1rem;
      font-weight: bold;
      color: #e1d0b5;
      background: #3d2b22;
      padding: 4px 16px;
      border-radius: 30px;
      border: 1px solid #7a5e4a;
    }
    .word-list-item.found-word {
      text-decoration: line-through;
      color: #9bba7a;
      border-color: #6f8f5a;
      background: #2f402a;
    }

    .maze-scene {
      background: #2a1c15;
      border-radius: 32px;
      padding: 16px 12px;
      border: 2px solid #6b4f3a;
    }
    .maze-character {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 2rem;
      background: #3d2b22;
      padding: 8px 18px;
      border-radius: 60px;
      border: 2px solid #b48b5a;
      width: fit-content;
      margin: 4px auto 12px;
    }
    .maze-question {
      background: #33251e;
      padding: 16px;
      border-radius: 28px;
      border-left: 8px solid #b48b5a;
      margin: 12px 0;
      font-size: 1.2rem;
    }
    .maze-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 12px 0;
    }
    .maze-option {
      background: #4d3529;
      border: 2px solid #6b4f3a;
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #f2e0c9;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 4px 0 #241810;
      text-align: left;
    }
    .maze-option:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #241810;
    }
    .maze-option.correct {
      background: #5f7a4a;
      border-color: #b4d48a;
    }
    .maze-option.wrong {
      background: #8f4e3e;
      border-color: #d68a7a;
    }

    .lives-display {
      font-size: 2rem;
      letter-spacing: 6px;
      color: #e1b08a;
      text-shadow: 0 0 12px #c97a4a;
      background: #241810;
      padding: 0 18px;
      border-radius: 60px;
      border: 1px solid #7a5e4a;
    }

    .final-screen {
      background: #2a1c15;
      border-radius: 48px;
      padding: 28px 16px;
      border: 4px solid #b48b5a;
      text-align: center;
      box-shadow: 0 0 40px rgba(180, 139, 90, 0.3);
    }

    .stars-display {
      font-size: 3.4rem;
      letter-spacing: 10px;
    }

    @media (max-width: 600px) {
      .game-wrapper { padding: 12px 8px; }
      .stage-title { font-size: 1.2rem; }
      .task-text { font-size: 1rem; padding: 12px; }
      .clickable-word { font-size: 1rem; padding: 2px 8px; }
      .ws-cell { font-size: 1rem; }
      .btn { font-size: 1rem; padding: 12px 18px; }
      .word-list-item { font-size: 0.9rem; }
    }
    @media (max-width: 420px) {
      .ws-cell { font-size: 0.7rem; border-radius: 8px; }
      .wordsearch-grid { gap: 2px; padding: 6px; }
      .candle-deco { display: none; }
    }

    .hidden { display: none !important; }

    .confetti-flash {
      animation: confettiPop 0.6s ease;
    }
    @keyframes confettiPop {
      0% { transform: scale(1); background: #dbb47a; }
      50% { transform: scale(1.2); background: #e8d09a; box-shadow: 0 0 40px #f0d080; }
      100% { transform: scale(1); background: transparent; }
    }
    .shake {
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="candle-deco candle-left"></div>
  <div class="candle-deco candle-right"></div>
  <div class="candle-deco candle-bottom"></div>
  <div class="game-container" id="app">
    <div class="progress-area" id="progressArea">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-counter" id="progressCounter">0 / 18</span>
    </div>
    <div id="stageContainer"></div>
  </div>
</div>
<script>
  (function(){
    const STAGES = [
      { id: 1, name: 'Найди ошибку', total: 6 },
      { id: 2, name: 'Филворд', total: 6 },
      { id: 3, name: 'Лабиринт', total: 5 }
    ];
    const TOTAL_TASKS = 17;

    let currentStage = 0;
    let stageProgress = [0,0,0];
    let totalCorrect = 0;
    let lives = 3;
    let mazeStep = 0;

    let wordsearchWords = [];
    let wordsearchFound = [];
    let wordsearchCells = [];
    let wsFirstSelected = null;
    let wsLocked = false;

    let errorTaskIndex = 0;
    let errorAnswered = false;

    function getTotalDone() {
      return stageProgress.reduce((a,b)=>a+b,0);
    }

    function updateProgress() {
      const done = getTotalDone();
      const pct = Math.min(100, (done / TOTAL_TASKS) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressCounter').textContent = `${done} / ${TOTAL_TASKS}`;
    }

    // ====== ЭТАП 1: НАЙДИ ОШИБКУ ======
    const errorTasks = [
      { text: 'Мой друг отличьно играет в шахматы.', errorWord: 'отличьно', correct: 'отлично', rule: 'Пишем "отлично" без мягкого знака, проверочное слово "отличный".' },
      { text: 'На столе лежит спелая груша и яблако.', errorWord: 'яблако', correct: 'яблоко', rule: 'Пишем "яблоко" с буквой "о" в конце, запомни: яблоко.' },
      { text: 'Мальчик пашол в лес за грибами.', errorWord: 'пашол', correct: 'пошёл', rule: 'Глагол "пошёл" пишется с буквой "ё" после "ш", проверь: "шёл".' },
      { text: 'На улице сильный мароз.', errorWord: 'мароз', correct: 'мороз', rule: 'Пишем "мороз" с буквой "о", проверочное слово "морозы".' },
      { text: 'Воробей сидел на ветке и чырикал.', errorWord: 'чырикал', correct: 'чирикал', rule: 'Пишем "чирикал" с буквой "и" после "ч", проверь: "чирик".' },
      { text: 'Девочка налила в стакан малако.', errorWord: 'малако', correct: 'молоко', rule: 'Пишем "молоко" с буквой "о" в корне, проверочное слово "молочный".' }
    ];

    function renderStage1() {
      if (errorTaskIndex >= errorTasks.length) {
        completeStage(1);
        return;
      }
      const task = errorTasks[errorTaskIndex];
      const words = task.text.split(/\s+/).filter(w => w.length > 0);
      let html = `<div class="stage-panel"><div class="stage-title">📜 Найди ошибку <span style="font-size:0.9rem;">${errorTaskIndex+1}/${errorTasks.length}</span></div>`;
      html += `<div class="task-text">Нажми на слово с ошибкой:</div><div style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">`;
      words.forEach((w, idx) => {
        const clean = w.replace(/[.,!?;:]/g, '');
        html += `<span class="clickable-word" data-word="${clean}" data-idx="${idx}">${w}</span>`;
      });
      html += `</div><div id="feedback1" class="feedback-box hidden"></div>`;
      html += `<div class="flex-center"><button class="btn btn-primary" id="nextErrorBtn" disabled>Дальше →</button></div></div>`;
      document.getElementById('stageContainer').innerHTML = html;

      document.querySelectorAll('.clickable-word').forEach(el => {
        el.addEventListener('click', function(e) {
          if (errorAnswered) return;
          const word = this.dataset.word;
          const isError = (word === task.errorWord);
          const fb = document.getElementById('feedback1');
          fb.classList.remove('hidden', 'shake', 'confetti-flash');
          if (isError) {
            this.classList.add('correct-highlight');
            fb.innerHTML = `<span style="color:var(--game-success);">✨ Отлично! </span>Верно, ошибка в слове «${task.errorWord}». Правильно: <strong>${task.correct}</strong>. ${task.rule}`;
            fb.style.borderLeftColor = 'var(--game-success)';
            fb.classList.add('confetti-flash');
            totalCorrect++;
            errorAnswered = true;
            document.getElementById('nextErrorBtn').disabled = false;
            stageProgress[0] = errorTaskIndex + 1;
            updateProgress();
          } else {
            this.classList.add('wrong-highlight');
            fb.innerHTML = `<span style="color:var(--game-error);">🔮 Почти! Попробуй ещё раз. </span>Ошибка не в этом слове. Проверь внимательнее.`;
            fb.style.borderLeftColor = 'var(--game-error)';
            fb.classList.add('shake');
            setTimeout(() => { this.classList.remove('wrong-highlight'); }, 600);
          }
        });
      });

      document.getElementById('nextErrorBtn').addEventListener('click', function() {
        errorTaskIndex++;
        errorAnswered = false;
        renderStage1();
      });
    }

    // ====== ЭТАП 2: ФИЛВОРД (10×10, 6 слов, без "СВЯЗЬ") ======
    const wsWords = ['ТЕКСТ', 'ТЕМА', 'МЫСЛЬ', 'ЗАГЛАВИЕ', 'АБЗАЦ', 'СТИЛЬ'];
    const WS_SIZE = 10;

    function generateWordsearch() {
      const grid = Array.from({length: WS_SIZE}, () => Array(WS_SIZE).fill(''));
      const placed = [];
      const directions = [[0,1],[1,0],[0,-1],[-1,0]];

      const shuffled = [...wsWords].sort(() => Math.random() - 0.5);
      for (let word of shuffled) {
        let placedOk = false;
        for (let attempt = 0; attempt < 200; attempt++) {
          const dir = directions[Math.floor(Math.random() * directions.length)];
          const r0 = Math.floor(Math.random() * WS_SIZE);
          const c0 = Math.floor(Math.random() * WS_SIZE);
          let ok = true;
          for (let i=0; i<word.length; i++) {
            const r = r0 + dir[0]*i, c = c0 + dir[1]*i;
            if (r<0 || r>=WS_SIZE || c<0 || c>=WS_SIZE) { ok=false; break; }
            if (grid[r][c] !== '' && grid[r][c] !== word[i]) { ok=false; break; }
          }
          if (ok) {
            for (let i=0; i<word.length; i++) {
              const r = r0 + dir[0]*i, c = c0 + dir[1]*i;
              grid[r][c] = word[i];
            }
            placed.push({word, r: r0, c: c0, dir});
            placedOk = true;
            break;
          }
        }
        if (!placedOk) {
          for (let c=0; c<WS_SIZE-word.length+1; c++) {
            let ok = true;
            for (let i=0; i<word.length; i++) {
              if (grid[0][c+i] !== '' && grid[0][c+i] !== word[i]) { ok=false; break; }
            }
            if (ok) {
              for (let i=0; i<word.length; i++) grid[0][c+i] = word[i];
              placed.push({word, r:0, c, dir:[0,1]});
              break;
            }
          }
        }
      }

      const letters = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
      for (let r=0; r<WS_SIZE; r++) {
        for (let c=0; c<WS_SIZE; c++) {
          if (grid[r][c] === '') grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
        }
      }
      return { grid, placed };
    }

    let wsGrid = [];
    let wsPlaced = [];

    function renderStage2() {
      if (wordsearchFound.length >= wsWords.length) {
        completeStage(2);
        return;
      }
      const container = document.getElementById('stageContainer');
      let html = `<div class="stage-panel"><div class="stage-title">🔍 Найди слова <span style="font-size:0.9rem;">${wordsearchFound.length}/${wsWords.length}</span></div>`;
      html += `<div class="task-text">Кликни на первую и последнюю букву слова (по горизонтали или вертикали)</div>`;

      html += `<div class="wordsearch-grid" id="wsGrid">`;
      for (let r=0; r<WS_SIZE; r++) {
        for (let c=0; c<WS_SIZE; c++) {
          const ch = wsGrid[r][c];
          const found = wordsearchCells.some(cell => cell.r===r && cell.c===c && cell.found);
          const cls = found ? 'ws-cell found' : 'ws-cell';
          html += `<div class="${cls}" data-r="${r}" data-c="${c}">${ch}</div>`;
        }
      }
      html += `</div>`;

      html += `<div class="word-list">`;
      wsWords.forEach(w => {
        const f = wordsearchFound.includes(w);
        html += `<span class="word-list-item ${f?'found-word':''}">${w}</span>`;
      });
      html += `</div>`;
      html += `<div id="wsFeedback" class="feedback-box hidden"></div>`;
      html += `<div class="flex-center"><button class="btn btn-primary" id="wsNextBtn" disabled>Дальше →</button></div></div>`;
      container.innerHTML = html;

      document.querySelectorAll('.ws-cell').forEach(el => {
        el.addEventListener('click', function() {
          if (wsLocked) return;
          const r = parseInt(this.dataset.r), c = parseInt(this.dataset.c);
          if (wordsearchCells.some(cell => cell.r===r && cell.c===c && cell.found)) {
            return;
          }
          if (wsFirstSelected === null) {
            this.classList.add('selected');
            wsFirstSelected = {r,c};
          } else {
            const r1 = wsFirstSelected.r, c1 = wsFirstSelected.c;
            let wordFound = null;
            let dir = null;
            if (r1 === r) {
              const minC = Math.min(c1, c);
              const maxC = Math.max(c1, c);
              let letters = '';
              for (let cc=minC; cc<=maxC; cc++) letters += wsGrid[r][cc];
              for (let w of wsWords) {
                if (wordsearchFound.includes(w)) continue;
                if (letters === w) { wordFound = w; dir = [0,1]; break; }
              }
              if (!wordFound) {
                letters = letters.split('').reverse().join('');
                for (let w of wsWords) {
                  if (wordsearchFound.includes(w)) continue;
                  if (letters === w) { wordFound = w; dir = [0,-1]; break; }
                }
              }
              if (wordFound) {
                const cells = [];
                const step = (dir[1] === 1) ? 1 : -1;
                for (let i=0; i<wordFound.length; i++) {
                  const cc = (dir[1]===1) ? minC+i : maxC-i;
                  cells.push({r, c: cc, found: true});
                }
                cells.forEach(cell => {
                  const idx = r*WS_SIZE + cell.c;
                  const elCell = document.querySelectorAll('.ws-cell')[idx];
                  if (elCell) { elCell.classList.remove('selected'); elCell.classList.add('found'); }
                });
                wordsearchCells.push(...cells);
                wordsearchFound.push(wordFound);
                document.querySelectorAll('.word-list-item').forEach(el => {
                  if (el.textContent === wordFound) el.classList.add('found-word');
                });
                const fb = document.getElementById('wsFeedback');
                fb.classList.remove('hidden', 'shake', 'confetti-flash');
                fb.innerHTML = `<span style="color:var(--game-success);">✨ Отлично! Слово «${wordFound}» найдено!</span>`;
                fb.style.borderLeftColor = 'var(--game-success)';
                fb.classList.add('confetti-flash');
                totalCorrect++;
                stageProgress[1] = wordsearchFound.length;
                updateProgress();
                if (wordsearchFound.length >= wsWords.length) {
                  document.getElementById('wsNextBtn').disabled = false;
                }
                wsFirstSelected = null;
                document.querySelectorAll('.ws-cell.selected').forEach(el => el.classList.remove('selected'));
              } else {
                const fb = document.getElementById('wsFeedback');
                fb.classList.remove('hidden', 'shake', 'confetti-flash');
                fb.innerHTML = `<span style="color:var(--game-error);">🔮 Не слово. Попробуй ещё раз.</span>`;
                fb.style.borderLeftColor = 'var(--game-error)';
                fb.classList.add('shake');
                document.querySelectorAll('.ws-cell.selected').forEach(el => el.classList.remove('selected'));
                wsFirstSelected = null;
              }
            } else if (c1 === c) {
              const minR = Math.min(r1, r);
              const maxR = Math.max(r1, r);
              let letters = '';
              for (let rr=minR; rr<=maxR; rr++) letters += wsGrid[rr][c];
              let wordFound = null, dir = null;
              for (let w of wsWords) {
                if (wordsearchFound.includes(w)) continue;
                if (letters === w) { wordFound = w; dir = [1,0]; break; }
              }
              if (!wordFound) {
                letters = letters.split('').reverse().join('');
                for (let w of wsWords) {
                  if (wordsearchFound.includes(w)) continue;
                  if (letters === w) { wordFound = w; dir = [-1,0]; break; }
                }
              }
              if (wordFound) {
                const cells = [];
                const step = (dir[0] === 1) ? 1 : -1;
                for (let i=0; i<wordFound.length; i++) {
                  const rr = (dir[0]===1) ? minR+i : maxR-i;
                  cells.push({r: rr, c, found: true});
                }
                cells.forEach(cell => {
                  const idx = cell.r*WS_SIZE + cell.c;
                  const elCell = document.querySelectorAll('.ws-cell')[idx];
                  if (elCell) { elCell.classList.remove('selected'); elCell.classList.add('found'); }
                });
                wordsearchCells.push(...cells);
                wordsearchFound.push(wordFound);
                document.querySelectorAll('.word-list-item').forEach(el => {
                  if (el.textContent === wordFound) el.classList.add('found-word');
                });
                const fb = document.getElementById('wsFeedback');
                fb.classList.remove('hidden', 'shake', 'confetti-flash');
                fb.innerHTML = `<span style="color:var(--game-success);">✨ Отлично! Слово «${wordFound}» найдено!</span>`;
                fb.style.borderLeftColor = 'var(--game-success)';
                fb.classList.add('confetti-flash');
                totalCorrect++;
                stageProgress[1] = wordsearchFound.length;
                updateProgress();
                if (wordsearchFound.length >= wsWords.length) {
                  document.getElementById('wsNextBtn').disabled = false;
                }
                wsFirstSelected = null;
                document.querySelectorAll('.ws-cell.selected').forEach(el => el.classList.remove('selected'));
              } else {
                const fb = document.getElementById('wsFeedback');
                fb.classList.remove('hidden', 'shake', 'confetti-flash');
                fb.innerHTML = `<span style="color:var(--game-error);">🔮 Не слово. Попробуй ещё раз.</span>`;
                fb.style.borderLeftColor = 'var(--game-error)';
                fb.classList.add('shake');
                document.querySelectorAll('.ws-cell.selected').forEach(el => el.classList.remove('selected'));
                wsFirstSelected = null;
              }
            } else {
              const fb = document.getElementById('wsFeedback');
              fb.classList.remove('hidden', 'shake', 'confetti-flash');
              fb.innerHTML = `<span style="color:var(--game-error);">🔮 Выбери буквы по горизонтали или вертикали.</span>`;
              fb.style.borderLeftColor = 'var(--game-error)';
              fb.classList.add('shake');
              document.querySelectorAll('.ws-cell.selected').forEach(el => el.classList.remove('selected'));
              wsFirstSelected = null;
            }
          }
        });
      });

      document.getElementById('wsNextBtn').addEventListener('click', function() {
        if (wordsearchFound.length >= wsWords.length) {
          completeStage(2);
        }
      });
    }

    // ====== ЭТАП 3: ЛАБИРИНТ ======
    const mazeQuestions = [
      { question: 'Какая мысль выражает главное в тексте?', options: ['Тема', 'Главная мысль', 'Заголовок'], correct: 1 },
      { question: 'Что помогает определить тему текста?', options: ['Ключевые слова', 'Количество абзацев', 'Длина текста'], correct: 0 },
      { question: 'Текст — это…', options: ['Набор предложений', 'Связанные по смыслу предложения', 'Список слов'], correct: 1 },
      { question: 'Где чаще всего выражена главная мысль?', options: ['В конце текста', 'В середине', 'В любом месте'], correct: 2 },
      { question: 'Что такое абзац?', options: ['Часть текста от красной строки до следующей', 'Одно предложение', 'Название текста'], correct: 0 }
    ];

    function renderStage3() {
      if (mazeStep >= mazeQuestions.length) {
        completeStage(3);
        return;
      }
      const q = mazeQuestions[mazeStep];
      const container = document.getElementById('stageContainer');
      let html = `<div class="stage-panel"><div class="stage-title">🧙 Лабиринт <span style="font-size:0.9rem;">${mazeStep+1}/${mazeQuestions.length}</span></div>`;
      html += `<div class="maze-scene">`;
      html += `<div class="maze-character">🐭 <span style="font-size:1rem; color:#e1d0b5;">Мышонок ищет выход</span></div>`;
      html += `<div class="maze-question">${q.question}</div>`;
      html += `<div class="maze-options">`;
      q.options.forEach((opt, idx) => {
        html += `<div class="maze-option" data-optidx="${idx}">${opt}</div>`;
      });
      html += `</div>`;
      html += `<div id="mazeFeedback" class="feedback-box hidden"></div>`;
      html += `<div class="flex-center"><button class="btn btn-primary" id="mazeNextBtn" disabled>Дальше →</button></div>`;
      html += `</div></div>`;
      container.innerHTML = html;

      updateLivesDisplay();

      document.querySelectorAll('.maze-option').forEach(el => {
        el.addEventListener('click', function() {
          const idx = parseInt(this.dataset.optidx);
          const correctIdx = q.correct;
          const fb = document.getElementById('mazeFeedback');
          fb.classList.remove('hidden', 'shake', 'confetti-flash');
          const allOpts = document.querySelectorAll('.maze-option');
          if (idx === correctIdx) {
            this.classList.add('correct');
            fb.innerHTML = `<span style="color:var(--game-success);">✨ Верно! </span>${q.question} — правильный ответ: "${q.options[correctIdx]}".`;
            fb.style.borderLeftColor = 'var(--game-success)';
            fb.classList.add('confetti-flash');
            totalCorrect++;
            stageProgress[2] = mazeStep+1;
            updateProgress();
            document.getElementById('mazeNextBtn').disabled = false;
            allOpts.forEach(o => o.style.pointerEvents = 'none');
          } else {
            this.classList.add('wrong');
            fb.innerHTML = `<span style="color:var(--game-error);">🔮 Тупик! </span>Неверно. Правильный ответ: "${q.options[correctIdx]}". Попробуй ещё раз.`;
            fb.style.borderLeftColor = 'var(--game-error)';
            fb.classList.add('shake');
            lives--;
            updateLivesDisplay();
            if (lives <= 0) {
              fb.innerHTML += `<br><span style="color:#c47a6a;">Жизни кончились. Начни заново.</span>`;
              document.getElementById('mazeNextBtn').disabled = false;
              document.getElementById('mazeNextBtn').textContent = 'Начать сначала';
              document.getElementById('mazeNextBtn').onclick = function() { resetGame(); };
              return;
            }
            setTimeout(() => {
              this.classList.remove('wrong');
              fb.classList.add('hidden');
            }, 1000);
          }
        });
      });

      document.getElementById('mazeNextBtn').addEventListener('click', function() {
        if (lives <= 0) {
          resetGame();
          return;
        }
        mazeStep++;
        renderStage3();
      });
    }

    function updateLivesDisplay() {
      let livesEl = document.querySelector('.lives-display');
      if (!livesEl) {
        const container = document.getElementById('stageContainer');
        const panel = container.querySelector('.stage-panel');
        if (panel) {
          const div = document.createElement('div');
          div.className = 'lives-display';
          div.style.marginBottom = '10px';
          div.style.textAlign = 'center';
          panel.prepend(div);
          livesEl = div;
        } else {
          return;
        }
      }
      livesEl.textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3-lives));
    }

    function completeStage(stageId) {
      const stage = STAGES[stageId-1];
      const container = document.getElementById('stageContainer');
      let msg = '';
      if (stageId === 1) msg = 'Все ошибки найдены! Ты — настоящий знаток!';
      else if (stageId === 2) msg = 'Все слова найдены! Филворд разгадан!';
      else if (stageId === 3) msg = 'Лабиринт пройден! Мышонок спасён!';

      container.innerHTML = `<div class="stage-panel final-screen">
        <div style="font-size:2.2rem;">🎉</div>
        <h2 style="color:#f0dbb0;">Этап «${stage.name}» пройден!</h2>
        <p style="font-size:1.2rem; margin:10px 0;">${msg}</p>
        <div class="flex-center"><button class="btn btn-primary" id="nextStageBtn">➡️ Дальше</button></div>
      </div>`;
      document.getElementById('nextStageBtn').addEventListener('click', function() {
        if (currentStage < 2) {
          currentStage++;
          initStage(currentStage);
        } else {
          showFinalScreen();
        }
      });
    }

    function showFinalScreen() {
      const container = document.getElementById('stageContainer');
      const total = TOTAL_TASKS;
      const stars = totalCorrect >= total ? 3 : (totalCorrect >= total*0.75 ? 2 : (totalCorrect >= total*0.5 ? 1 : 0));
      const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
      const nextStar = stars < 3 ? `До следующей награды не хватило ${Math.ceil(total*(stars+1)/3)-totalCorrect} ответов.` : '';

      container.innerHTML = `<div class="stage-panel final-screen">
        <h1 style="color:#f0dbb0; font-size:2.2rem;">🏆 Миссия выполнена!</h1>
        <div class="stars-display">${starStr}</div>
        <p style="font-size:1.4rem;">Правильных ответов: ${totalCorrect} из ${total}</p>
        <p style="color:#c9a87c;">${nextStar}</p>
        <div class="flex-center" style="margin-top:18px;">
          <button class="btn btn-primary" id="resetGameBtn">🔄 Играть снова</button>
        </div>
      </div>`;
      document.getElementById('resetGameBtn').addEventListener('click', resetGame);
    }

    function initStage(stageIdx) {
      if (stageIdx === 0) {
        errorTaskIndex = 0;
        errorAnswered = false;
        renderStage1();
      } else if (stageIdx === 1) {
        if (wsGrid.length === 0) {
          const data = generateWordsearch();
          wsGrid = data.grid;
          wsPlaced = data.placed;
          wordsearchFound = [];
          wordsearchCells = [];
          wsFirstSelected = null;
        }
        renderStage2();
      } else if (stageIdx === 2) {
        mazeStep = 0;
        renderStage3();
      }
      updateProgress();
      if (stageIdx === 2) {
        lives = 3;
        updateLivesDisplay();
      }
    }

    function resetGame() {
      currentStage = 0;
      stageProgress = [0,0,0];
      totalCorrect = 0;
      lives = 3;
      mazeStep = 0;
      errorTaskIndex = 0;
      errorAnswered = false;
      wordsearchFound = [];
      wordsearchCells = [];
      wsGrid = [];
      wsFirstSelected = null;
      wsLocked = false;
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('progressCounter').textContent = '0 / 17';
      initStage(0);
    }

    function renderStartScreen() {
      const container = document.getElementById('stageContainer');
      container.innerHTML = `<div class="stage-panel final-screen" style="padding: 30px 16px;">
        <div style="font-size:3.8rem;">🧪📜</div>
        <h1 style="color:#f0dbb0; font-size:2.4rem;">Тайны текста</h1>
        <p style="font-size:1.2rem; color:#d4c0a8;">Волшебная школа зельеварения<br>Найди ошибки, разгадай слова и пройди лабиринт!</p>
        <div class="flex-center" style="margin-top:20px;">
          <button class="btn btn-primary" id="startBtn" style="font-size:1.6rem;">Начать</button>
        </div>
      </div>`;
      document.getElementById('startBtn').addEventListener('click', function() {
        resetGame();
      });
    }

    renderStartScreen();
    updateProgress();
  })();
</script>
</body>
</html>
