<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Математический Квест</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .game-container {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 60px 60px 40px 40px;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,215,0,0.2);
            border: 2px solid rgba(255,215,0,0.3);
            transition: 0.3s;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-bottom: 0.3rem;
        }
        .title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff9e6;
            text-shadow: 0 4px 0 #7a3b0e, 0 8px 20px #00000066;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .title-emoji {
            font-size: 2.6rem;
        }
        .level-badge {
            background: #ffd700;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #3d1f00;
            box-shadow: 0 4px 0 #a67c00;
            border: 2px solid #ffe47a;
        }
        .mechanics-row {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 0.4rem 0 1rem 0;
        }
        .mech-tag {
            background: rgba(0,0,0,0.35);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: #ffecb3;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border: 1px solid #ffd70066;
            backdrop-filter: blur(4px);
        }
        .quest-panel {
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 1.8rem 1.8rem 1.5rem;
            box-shadow: inset 0 4px 20px #00000066, 0 10px 30px #00000055;
            border-bottom: 5px solid #ffd700;
            margin-bottom: 1.5rem;
            min-height: 150px;
        }
        .quest-text {
            color: #fef9e0;
            font-size: 1.9rem;
            font-weight: 600;
            line-height: 1.5;
            text-align: center;
            word-break: break-word;
            text-shadow: 0 2px 8px #00000044;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0 0.8rem;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.7rem;
            width: 100%;
        }
        #answerInput {
            background: #0f1a2b;
            border: 3px solid #ffd700aa;
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            font-size: 1.6rem;
            width: 200px;
            color: #fff9e6;
            outline: none;
            text-align: center;
            font-weight: 700;
            transition: 0.2s;
            box-shadow: 0 4px 0 #5a3f0e;
        }
        #answerInput:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 5px #ffd70055, 0 4px 0 #5a3f0e;
        }
        #answerInput::placeholder {
            color: #667e99;
            font-size: 1rem;
            font-weight: 400;
        }
        .btn {
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s ease;
            letter-spacing: 0.5px;
            min-width: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .btn:active {
            transform: translateY(4px);
        }
        .btn-primary {
            background: #ffd700;
            color: #1a2a3a;
            box-shadow: 0 6px 0 #b8860b, 0 6px 16px #00000055;
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 #b8860b;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b8860b;
            pointer-events: none;
        }
        .btn-secondary {
            background: #4a6a8a;
            color: white;
            box-shadow: 0 6px 0 #1f3a4f;
        }
        .btn-secondary:active {
            box-shadow: 0 2px 0 #1f3a4f;
        }
        .feedback {
            font-size: 1.3rem;
            font-weight: 600;
            min-height: 3rem;
            padding: 0.6rem 1rem;
            text-align: center;
            border-radius: 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            margin-top: 0.2rem;
            color: #f0f4fa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            padding: 0.7rem 1.2rem;
            margin-top: 1.2rem;
            color: #d4e4f0;
            font-weight: 600;
            border: 1px solid #ffd70044;
            flex-wrap: wrap;
            gap: 0.3rem 1rem;
        }
        .stats-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 1rem;
        }
        .stats-item .num {
            color: #ffd700;
            font-size: 1.4rem;
            font-weight: 800;
            min-width: 1.8rem;
        }
        .footer-btns {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 0.8rem 0 0.2rem;
        }
        .btn-small {
            padding: 0.6rem 1.4rem;
            font-size: 0.95rem;
            min-width: auto;
        }
        .star-rating {
            color: #ffd700;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        @media (max-width: 550px) {
            .game-container { padding: 1.2rem 0.8rem; }
            .title { font-size: 1.6rem; }
            .quest-text { font-size: 1.4rem; }
            #answerInput { width: 140px; font-size: 1.3rem; padding: 0.7rem 1rem; }
            .btn { padding: 0.7rem 1.2rem; font-size: 1rem; min-width: 90px; }
            .stats-item { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="title">
            <span class="title-emoji">🧙</span>
            Математический Квест
        </div>
        <div class="level-badge">⭐ 2 класс</div>
    </div>

    <div class="mechanics-row">
        <span class="mech-tag">📐 Периметр треугольника</span>
        <span class="mech-tag">🔲 Периметр квадрата</span>
        <span class="mech-tag">▭ Периметр прямоугольника</span>
    </div>

    <div class="quest-panel">
        <div id="questionDisplay" class="quest-text">🌟 Нажми «Новое задание»</div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="number" id="answerInput" placeholder="Ответ" step="1" inputmode="numeric">
            <button id="submitBtn" class="btn btn-primary">✅ Проверить</button>
        </div>
        <div id="feedbackMessage" class="feedback">
            <span>✨</span> Введи число и нажми «Проверить»
        </div>
    </div>

    <div class="stats">
        <div class="stats-item">🏆 Счёт: <span class="num" id="scoreDisplay">0</span></div>
        <div class="stats-item">📝 Попыток: <span class="num" id="attemptDisplay">0</span></div>
        <div class="stats-item">✅ Верно: <span class="num" id="correctDisplay">0</span></div>
        <div class="stats-item star-rating" id="starDisplay">☆☆☆</div>
    </div>

    <div class="footer-btns">
        <button id="newTaskBtn" class="btn btn-secondary btn-small">🎲 Новое задание</button>
        <button id="resetGameBtn" class="btn btn-secondary btn-small">🔄 Сброс</button>
    </div>
</div>

<script>
    (function() {
        const state = {
            currentTask: null,
            score: 0,
            attempts: 0,
            correct: 0,
            isAnswered: false,
        };

        const questionDisplay = document.getElementById('questionDisplay');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const feedbackMessage = document.getElementById('feedbackMessage');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const attemptDisplay = document.getElementById('attemptDisplay');
        const correctDisplay = document.getElementById('correctDisplay');
        const starDisplay = document.getElementById('starDisplay');
        const newTaskBtn = document.getElementById('newTaskBtn');
        const resetGameBtn = document.getElementById('resetGameBtn');

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function updateStars() {
            const stars = Math.min(3, Math.floor(state.correct / 5));
            starDisplay.textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
        }

        // Генератор задач (только периметр)
        function generateTask() {
            const shape = randomInt(0, 2);
            let task = {};

            if (shape === 0) {
                const a = randomInt(5, 25);
                const b = randomInt(5, 25);
                const c = randomInt(5, 25);
                const perimeter = a + b + c;
                task.question = `📐 Найди периметр треугольника со сторонами ${a}, ${b} и ${c}.`;
                task.answer = perimeter;
                task.mechanicsType = 'периметр треугольника';
            } else if (shape === 1) {
                const side = randomInt(5, 25);
                const perimeter = side * 4;
                task.question = `🔲 Найди периметр квадрата со стороной ${side}.`;
                task.answer = perimeter;
                task.mechanicsType = 'периметр квадрата';
            } else {
                const a = randomInt(5, 25);
                const b = randomInt(5, 25);
                const perimeter = 2 * (a + b);
                task.question = `▭ Найди периметр прямоугольника со сторонами ${a} и ${b}.`;
                task.answer = perimeter;
                task.mechanicsType = 'периметр прямоугольника';
            }

            return task;
        }

        function renderTask(task) {
            if (!task) {
                questionDisplay.textContent = '🌟 Нажми «Новое задание»';
                return;
            }
            questionDisplay.textContent = task.question;
        }

        function updateStats() {
            scoreDisplay.textContent = state.score;
            attemptDisplay.textContent = state.attempts;
            correctDisplay.textContent = state.correct;
            updateStars();
        }

        function resetInput() {
            answerInput.value = '';
            answerInput.disabled = false;
            submitBtn.disabled = false;
            state.isAnswered = false;
            feedbackMessage.innerHTML = '✏️ Введи число и нажми «Проверить»';
            answerInput.focus();
        }

        function loadNewTask() {
            const task = generateTask();
            state.currentTask = task;
            renderTask(task);
            resetInput();
            updateStats();
        }

        function handleSubmit() {
            if (state.isAnswered) {
                feedbackMessage.innerHTML = '⏳ Задание уже решено! Нажми «Новое задание».';
                return;
            }
            if (!state.currentTask) {
                feedbackMessage.innerHTML = '⚠️ Сначала создай задание (кнопка «Новое задание»).';
                return;
            }

            const raw = answerInput.value.trim();
            if (raw === '') {
                feedbackMessage.innerHTML = '❌ Введи число!';
                return;
            }
            const userAnswer = Number(raw);
            if (isNaN(userAnswer)) {
                feedbackMessage.innerHTML = '❌ Введи число цифрами!';
                return;
            }

            state.attempts += 1;
            const correct = state.currentTask.answer;
            const isCorrect = (Math.abs(userAnswer - correct) < 0.001);

            if (isCorrect) {
                state.score += 1;
                state.correct += 1;
                feedbackMessage.innerHTML = `🎉 Правильно! +1 балл`;
            } else {
                feedbackMessage.innerHTML = `😅 Неверно. Правильный ответ: ${correct}`;
            }

            state.isAnswered = true;
            answerInput.disabled = true;
            submitBtn.disabled = true;
            updateStats();
        }

        function resetGame() {
            state.score = 0;
            state.attempts = 0;
            state.correct = 0;
            state.isAnswered = false;
            state.currentTask = null;
            questionDisplay.textContent = '🔄 Игра сброшена!';
            resetInput();
            updateStats();
            answerInput.disabled = false;
            submitBtn.disabled = false;
            feedbackMessage.innerHTML = '✨ Игра сброшена. Начинай!';
        }

        function init() {
            loadNewTask();

            submitBtn.addEventListener('click', handleSubmit);
            newTaskBtn.addEventListener('click', loadNewTask);
            resetGameBtn.addEventListener('click', resetGame);

            answerInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            answerInput.focus();
        }

        init();
    })();
</script>
</body>
</html>
